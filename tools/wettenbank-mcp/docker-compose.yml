# Portainer-stack voor de Wettenbank MCP-server (HTTP-transport), achter Nginx Proxy Manager.
#
# De image komt van GHCR (zie .github/workflows/docker-publish.yml).
# De container publiceert GÉÉN host-poort: NPM bereikt 'm via het gedeelde Docker-netwerk
# op hostnaam `wettenbank-mcp`, poort 3000.
#
# In NPM → Proxy Hosts → Add: Domain `wettenbank-mcp.ipalm.nl`, Scheme `http`,
# Forward Hostname `wettenbank-mcp`, Forward Port `3000`, SSL (Let's Encrypt) aan.
# De bearer-token (MCP_AUTH_TOKEN) blijft de authenticatie; TLS regelt NPM.
#
# Stack-omgeving (in Portainer):
#   MCP_AUTH_TOKEN  — sterke, geheime token; clients sturen die als `Authorization: Bearer ...`
#   PROXY_NETWORK   — naam van het bestaande NPM-netwerk; hier `homeinfra_internal`
#                     (het `internal`-netwerk van de homeinfra-stack waar NPM op zit).

services:
  wettenbank-mcp:
    image: ghcr.io/palmw01/wettenbank-mcp:latest
    container_name: wettenbank-mcp
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      MCP_TRANSPORT: http
      PORT: "3000"
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:?zet MCP_AUTH_TOKEN in de stack-omgeving}
    networks:
      - proxy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK:-homeinfra_internal}
