# Portainer-stack voor de graph-qa-agent (de eigen kennisgraaf-chatbot-agent), intern.
#
# Vervangt de n8n-chatbot: de Wetsanalyse-API-chatproxy roept dit endpoint aan op
# http://graph-qa:8080/v1/n8n-chat (server→server via het gedeelde Docker-netwerk). GÉÉN host-poort
# en GÉÉN publieke NPM-host nodig — de agent is alleen intern bereikbaar. De image komt van GHCR
# (.github/workflows/graph-qa-docker-publish.yml).
#
# Stack-omgeving (Portainer, of via CI-stack-update):
#   GRAPH_QA_IMAGE   — image op digest (CI); handmatig valt 'ie terug op :latest.
#   PROXY_NETWORK    — bestaand netwerk gedeeld met de API (default homeinfra_internal).
#   SECRETS_DIR      — host-pad naar de secrets-map (default /opt/secrets/graph-qa;
#                      op Synology: /volume1/docker/secrets/graph-qa).
#   AZURE_FOUNDRY_BASE_URL / LLM_MODEL / GRAPHDB_MCP_URL — niet-geheime config.
#
# Secrets leven als bestanden op de host in SECRETS_DIR en gaan via *_FILE-variabelen (nooit als
# plain env in de container/Portainer-UI). Twee bestanden nodig (intern-only → géén chat-secret):
#   SECRETS_DIR=/volume1/docker/secrets/graph-qa; sudo mkdir -p "$SECRETS_DIR"
#   echo -n "<graphdb-token>"  | sudo tee "$SECRETS_DIR/graphdb_token" >/dev/null
#   echo -n "<azure-key>"      | sudo tee "$SECRETS_DIR/azure_foundry_api_key" >/dev/null
#   sudo chmod 755 "$SECRETS_DIR"; sudo chmod 644 "$SECRETS_DIR"/*
# (non-root uid 10001 leest via de "other"-bit → chmod 644.)

services:
  graph-qa:
    image: ${GRAPH_QA_IMAGE:-ghcr.io/palmw01/graph-qa:latest}
    container_name: graph-qa
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      # --- config (niet geheim) ---
      GRAPHDB_MCP_URL: ${GRAPHDB_MCP_URL:-https://graphdb-mcp.ipalm.nl/mcp}
      AZURE_FOUNDRY_BASE_URL: ${AZURE_FOUNDRY_BASE_URL:?zet AZURE_FOUNDRY_BASE_URL in de stack-omgeving}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-6}
      SIMILARITY_INDEX: ${SIMILARITY_INDEX:-bwb_similarity}
      CHECKPOINT_DB_PATH: /data/conversations_checkpoints.db
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      # --- secrets via host-bestanden (*_FILE) ---
      GRAPHDB_TOKEN_FILE: /run/secrets/graphdb_token
      AZURE_FOUNDRY_API_KEY_FILE: /run/secrets/azure_foundry_api_key
      # QA_API_TOKEN bewust NIET gezet: de service is intern-only (alleen de Wetsanalyse-API bereikt
      # 'm op het Docker-netwerk), dus het chat-webhook-endpoint heeft geen secret-slot nodig. Wil je
      # graph-qa tóch publiek exposen: zet QA_API_TOKEN_FILE=/run/secrets/qa_api_token en vul het
      # chat_secret in /beheer met dezelfde waarde.
      # --- observability (leeg = alleen JSON-logs) ---
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-graph-qa}
    volumes:
      - ${SECRETS_DIR:-/opt/secrets/graph-qa}:/run/secrets:ro
      - graph_qa_data:/data
    networks:
      - proxy
    mem_limit: 1g
    pids_limit: 256
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/health').status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK:-homeinfra_internal}

volumes:
  graph_qa_data:
