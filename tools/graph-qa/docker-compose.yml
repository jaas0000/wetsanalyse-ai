services:
  graph-qa:
    image: graph-qa:latest
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      GRAPHDB_MCP_URL: ${GRAPHDB_MCP_URL}
      GRAPHDB_TOKEN: ${GRAPHDB_TOKEN}
      AZURE_FOUNDRY_API_KEY: ${AZURE_FOUNDRY_API_KEY}
      AZURE_FOUNDRY_BASE_URL: ${AZURE_FOUNDRY_BASE_URL}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-6}
      QA_API_TOKEN: ${QA_API_TOKEN}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      PORT: ${PORT:-8080}
