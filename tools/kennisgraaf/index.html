<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kennisgraaf — Invorderingswet 1990</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a1628;
      color: #d9e6f2;
      font-family: "Fira Sans", system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    /* ── Header ── */
    #header {
      position: fixed; top: 0; left: 0; right: 0; height: 44px;
      background: #154273;
      display: flex; align-items: center; padding: 0 14px; gap: 12px;
      z-index: 20; box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }
    #header h1 { font-size: 14px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Filterbalk ── */
    #filters {
      position: fixed; top: 44px; left: 0; right: 0; height: 38px;
      background: rgba(10,20,44,.95);
      display: flex; align-items: center; padding: 0 14px; gap: 18px;
      z-index: 20; border-bottom: 1px solid #1d3a5e; flex-wrap: nowrap; overflow-x: auto;
    }
    #filters label {
      font-size: 12px; display: flex; align-items: center; gap: 5px;
      cursor: pointer; color: #a8c4e0; user-select: none; white-space: nowrap;
    }
    #filters input[type=checkbox] { accent-color: #4a8fd4; width: 13px; height: 13px; cursor: pointer; }
    .filter-sep { width: 1px; height: 18px; background: #1d3a5e; flex-shrink: 0; }
    #search-wrap { display: flex; align-items: center; gap: 6px; margin-left: auto; flex-shrink: 0; }
    #search-wrap span { font-size: 12px; color: #a8c4e0; }
    #search {
      background: #0d1f3c; border: 1px solid #2a4a72; color: #d9e6f2;
      font-size: 12px; padding: 3px 8px; border-radius: 4px; width: 130px; outline: none;
    }
    #search:focus { border-color: #4a8fd4; }
    #btn-reset {
      background: none; border: 1px solid #2a4a72; color: #a8c4e0;
      font-size: 11px; padding: 3px 8px; border-radius: 4px; cursor: pointer;
    }
    #btn-reset:hover { border-color: #4a8fd4; color: #d9e6f2; }

    /* ── Sidebar ── */
    #sidebar {
      position: fixed; top: 82px; left: 0; bottom: 0; width: 260px;
      background: #070f20; border-right: 1px solid #1d3a5e;
      display: flex; flex-direction: column; z-index: 10;
    }
    #tab-bar {
      display: flex; border-bottom: 1px solid #1d3a5e; flex-shrink: 0;
    }
    .tab-btn {
      flex: 1; padding: 9px 4px; font-size: 11px; font-weight: 600;
      background: none; border: none; border-bottom: 2px solid transparent;
      color: #6a8daa; cursor: pointer; transition: color .15s; white-space: nowrap;
    }
    .tab-btn:hover { color: #d9e6f2; }
    .tab-btn.active { color: #4a9eff; border-bottom-color: #4a9eff; }
    .tab-panel {
      display: none; flex: 1; overflow-y: auto; padding: 12px; font-size: 12px; line-height: 1.6;
    }
    .tab-panel.active { display: block; }

    /* ── Graaf ── */
    #graph-wrap { position: fixed; top: 82px; left: 260px; right: 0; bottom: 0; }

    /* ── Knoop-tab ── */
    #knoop-placeholder {
      color: #3a5272; font-size: 12px; text-align: center;
      padding: 40px 16px; line-height: 1.7;
    }
    #knoop-inhoud h2 { font-size: 14px; color: #fff; margin-bottom: 4px; }
    .badge-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .group-badge {
      display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px;
      background: #1d3a5e; color: #a8c4e0;
    }
    .wet-badge {
      display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px;
      background: #0d2a1a; color: #6ee7b7;
    }
    .ref { font-size: 10px; color: #6a8daa; word-break: break-all; margin-bottom: 6px; }
    .stat { color: #a8c4e0; font-size: 12px; }
    .stat strong { color: #d9e6f2; }
    .panel-hr { border: none; border-top: 1px solid #1d3a5e; margin: 7px 0; }
    #info-tekst { margin-bottom: 6px; }
    .lid-blok { margin-bottom: 8px; }
    .lid-nr { font-size: 10px; font-weight: 700; color: #6a8daa; margin-bottom: 2px; }
    .lid-tekst { font-size: 11px; color: #c8ddf0; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
    .link-item { font-size: 11px; padding: 2px 0; border-bottom: 1px solid #0d1f3c; color: #a8c4e0; }
    .link-item .arrow { color: #4a8fd4; margin: 0 3px; }
    .link-item.extref .arrow { color: #e07800; }
    .link-item.koppeling .arrow { color: #ffd166; }

    /* ── Legenda-tab ── */
    #tab-legenda h4 { font-size: 10px; color: #6a8daa; margin: 8px 0 3px; text-transform: uppercase; letter-spacing: .05em; }
    .leg-row { display: flex; align-items: center; gap: 7px; color: #a8c4e0; line-height: 1.9; font-size: 11px; }
    .leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .leg-line { width: 20px; height: 2px; flex-shrink: 0; }
    .leg-sep { border: none; border-top: 1px solid #1d3a5e; margin: 5px 0; }

    /* ── Overzicht-tab ── */
    .meta-row { font-size: 11px; color: #a8c4e0; line-height: 1.9; }
    .meta-row strong { color: #d9e6f2; }
    .meta-row span { color: #6a8daa; font-size: 10px; }
    .meta-row.sub { color: #6a8daa; font-size: 10px; margin-bottom: 2px; }

    /* ── Tooltip ── */
    #tooltip {
      display: none; position: fixed; pointer-events: none;
      background: rgba(8,18,40,.96); border: 1px solid #2a4a72; border-radius: 4px;
      padding: 5px 9px; font-size: 11px; color: #d9e6f2; z-index: 30;
      max-width: 240px; line-height: 1.5;
    }
    .tt-wet { color: #6ee7b7; font-size: 10px; }
    .tt-ref { color: #6a8daa; font-size: 10px; word-break: break-all; }

    /* ── Loader / fout ── */
    #loader {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #0a1628; z-index: 100;
      gap: 10px; font-size: 13px; color: #6a8daa;
    }
    .spinner {
      width: 32px; height: 32px; border: 3px solid #1d3a5e;
      border-top-color: #4a8fd4; border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-msg {
      display: none; position: fixed; inset: 0; flex-direction: column;
      align-items: center; justify-content: center; background: #0a1628; z-index: 100;
      gap: 10px; font-size: 13px; color: #e07800; text-align: center; padding: 20px;
    }
    #error-msg code { font-size: 11px; color: #6a8daa; background: #0d1f3c; padding: 3px 7px; border-radius: 3px; }
  </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><span>Kennisgraaf laden…</span></div>
<div id="error-msg">
  <span>⚠ graph.json kon niet worden geladen.</span>
  <span>Draai eerst: <code>WETTENBANK_TOKEN=… npx tsx extract.ts BWBR0004770</code></span>
  <span style="margin-top:6px;font-size:11px;color:#6a8daa">Daarna: <code>npx serve . -l 4567</code></span>
</div>

<div id="header">
  <h1 id="header-titel">Kennisgraaf</h1>
</div>

<div id="filters">
  <label><input type="checkbox" id="show-intern" checked> Intern</label>
  <label><input type="checkbox" id="show-koppeling" checked> Koppeling</label>
  <label><input type="checkbox" id="show-extern" checked> Extern</label>
  <label><input type="checkbox" id="show-structuur"> Structuur</label>
  <div class="filter-sep"></div>
  <label><input type="checkbox" id="show-isolated" checked> Geïsoleerde artikelen</label>
  <div id="search-wrap">
    <span>Zoek:</span>
    <input type="text" id="search" placeholder="art. nr of tekst">
    <span id="search-count" style="font-size:11px;color:#6ee7b7;display:none"></span>
    <button id="btn-reset">Reset</button>
  </div>
</div>

<div id="sidebar">
  <div id="tab-bar">
    <button class="tab-btn active" data-tab="overzicht">Overzicht</button>
    <button class="tab-btn" data-tab="knoop">Knoop</button>
    <button class="tab-btn" data-tab="legenda">Legenda</button>
  </div>

  <div id="tab-overzicht" class="tab-panel active"></div>

  <div id="tab-knoop" class="tab-panel">
    <div id="knoop-placeholder">Klik op een knoop in de graaf om details te zien.</div>
    <div id="knoop-inhoud" style="display:none">
      <h2 id="info-label"></h2>
      <div class="badge-row">
        <span id="info-group" class="group-badge"></span>
        <span id="info-wet" class="wet-badge" style="display:none"></span>
      </div>
      <div id="info-ref" class="ref"></div>
      <div id="info-pad" class="ref" style="display:none"></div>
      <div class="stat">Verbindingen: <strong id="info-grad"></strong></div>
      <hr class="panel-hr">
      <div id="info-tekst"></div>
      <div id="info-links"></div>
    </div>
  </div>

  <div id="tab-legenda" class="tab-panel"></div>
</div>

<div id="graph-wrap"></div>
<div id="tooltip"></div>

<script src="https://unpkg.com/3d-force-graph/dist/3d-force-graph.min.js"></script>
<script>
(async function () {

  // ── 1. Data laden ────────────────────────────────────────────────────────────

  let raw;
  try {
    if (window.__GRAPH_DATA__) {
      raw = window.__GRAPH_DATA__;
    } else {
      const resp = await fetch('./graph.json');
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      raw = await resp.json();
    }
  } catch {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('error-msg').style.display = 'flex';
    return;
  }
  document.getElementById('loader').style.display = 'none';

  const meta = raw.metadata ?? {};
  const wetten = meta.wetten ?? (meta.wet ? [{ bwbId: meta.bwbId ?? '', citeertitel: meta.wet }] : []);
  const wettenOrder = wetten.map(w => w.bwbId);
  const wetNamenMap = new Map(wetten.map(w => [w.bwbId, w.citeertitel]));

  const titelTekst = wetten.length > 1
    ? wetten.map(w => w.citeertitel).join(' + ')
    : (wetten[0]?.citeertitel ?? 'Kennisgraaf');
  document.getElementById('header-titel').textContent = 'Kennisgraaf — ' + titelTekst;
  document.title = 'Kennisgraaf — ' + titelTekst;

  // ── 2. Kleurenpaletten + pre-compute ─────────────────────────────────────────

  const WET_PALS = [
    ['#4a9eff','#60c8ff','#38bdf8','#22d3ee','#818cf8','#a78bfa','#7dd3fc','#5eead4','#93c5fd','#67e8f9'],
    ['#4ade80','#86efac','#34d399','#6ee7b7','#c4b5fd','#a3e635','#84cc16','#bbf7d0','#d9f99d','#6dd16a'],
    ['#fb923c','#fbbf24','#f472b6','#e879f9','#ffd166','#f9844a','#ff9f1c','#c77dff','#2ec4b6','#f4a261'],
  ];
  const EXTERN_PAL = [
    '#ff6b6b','#ffd166','#06d6a0','#f9844a','#ef4444','#e63946','#f4a261',
    '#e07800','#c77dff','#2ec4b6','#f472b6','#e879f9','#a3e635','#fbbf24','#fb923c',
  ];
  const KOPPELING_KLEUR = '#ffd166';

  const wetPalTellers = new Map(wettenOrder.map((id, i) => [id, { palIdx: Math.min(i, WET_PALS.length - 1), counter: 0 }]));
  const groepKleur = new Map();
  let ei = 0;

  const SECTIE_KLEUREN = { wet: '#f1f5f9', hoofdstuk: '#94a3b8', deel: '#94a3b8', titel: '#94a3b8', afdeling: '#64748b', paragraaf: '#475569' };

  for (const n of raw.nodes) {
    if (n.type === 'intern') {
      const key = (n.bwbId || '_') + '#' + n.group;
      if (!groepKleur.has(key)) {
        const wetInfo = wetPalTellers.get(n.bwbId);
        const pal = wetInfo ? WET_PALS[wetInfo.palIdx] : WET_PALS[0];
        groepKleur.set(key, pal[(wetInfo ? wetInfo.counter++ : 0) % pal.length]);
      }
    } else if (n.type !== 'sectie' && n.type !== 'wet') {
      const key = n.bwbId || n.group;
      if (!groepKleur.has(key)) groepKleur.set(key, EXTERN_PAL[ei++ % EXTERN_PAL.length]);
    }
  }

  for (const n of raw.nodes) {
    if (n.type === 'wet') {
      n.baseColor = '#f1f5f9';
      n.val = 30;
    } else if (n.type === 'sectie') {
      n.baseColor = SECTIE_KLEUREN[n.sectieType] ?? '#64748b';
      n.val = n.sectieType === 'hoofdstuk' || n.sectieType === 'deel' || n.sectieType === 'titel' ? 18 : 10;
    } else {
      const key = n.type === 'intern' ? (n.bwbId || '_') + '#' + n.group : (n.bwbId || n.group);
      n.baseColor = groepKleur.get(key) ?? '#888';
      n.val = Math.sqrt((n.grad ?? 0) + 1) * 3 + 2;
    }
    n.color = n.baseColor;
  }
  for (const l of raw.links) {
    l.color = l.soort === 'intref'    ? '#60a5fa'
            : l.soort === 'koppeling' ? KOPPELING_KLEUR
            : l.soort === 'structuur' ? '#a78bfa'
            : '#fb923c';
  }

  // ── 3. Links per node indexeren ───────────────────────────────────────────────

  const linksVanNode = new Map();
  for (const l of raw.links) {
    for (const [id, richt] of [[l.source, 'uit'], [l.target, 'in']]) {
      const k = typeof id === 'object' ? id.id : id;
      if (!linksVanNode.has(k)) linksVanNode.set(k, []);
      linksVanNode.get(k).push({ link: l, richting: richt });
    }
  }
  const nodeById = new Map(raw.nodes.map(n => [n.id, n]));

  // ── 4. Graaf bouwen ───────────────────────────────────────────────────────────

  const Graph = ForceGraph3D()(document.getElementById('graph-wrap'))
    .backgroundColor('#0a1628')
    .nodeId('id')
    .nodeLabel(() => '')
    .nodeColor('color')
    .nodeVal('val')
    .linkColor('color')
    .linkOpacity(0.5)
    .linkWidth(0.6)
    .linkDirectionalArrowLength(3)
    .linkDirectionalArrowRelPos(1)
    .d3AlphaDecay(0.025)
    .d3VelocityDecay(0.35)
    .warmupTicks(80)
    .onNodeClick(handleClick)
    .onNodeHover(handleHover)
    .onBackgroundClick(() => {});

  pasFilter();

  // ── 5. Filter ─────────────────────────────────────────────────────────────────

  function pasFilter() {
    const toonIntern    = document.getElementById('show-intern').checked;
    const toonKoppeling = document.getElementById('show-koppeling').checked;
    const toonExtern    = document.getElementById('show-extern').checked;
    const toonStructuur = document.getElementById('show-structuur').checked;
    const toonIsol      = document.getElementById('show-isolated').checked;

    const toegestaan = new Set();
    if (toonIntern)    toegestaan.add('intref');
    if (toonKoppeling) toegestaan.add('koppeling');
    if (toonExtern)    toegestaan.add('extref');
    if (toonStructuur) toegestaan.add('structuur');

    const gefLinks = raw.links.filter(l => toegestaan.has(l.soort));
    const actief = new Set();
    for (const l of gefLinks) {
      actief.add(typeof l.source === 'object' ? l.source.id : l.source);
      actief.add(typeof l.target === 'object' ? l.target.id : l.target);
    }
    const gefNodes = raw.nodes.filter(n => {
      if (n.type === 'intern') return true;
      if (n.type === 'sectie' || n.type === 'wet') return toonStructuur;
      if (!toonExtern) return false;
      if (!toonIsol && !actief.has(n.id)) return false;
      return true;
    });
    Graph.graphData({ nodes: gefNodes, links: gefLinks });
  }

  // ── 6. Zoeken / markeren ──────────────────────────────────────────────────────

  let zoekActief = false;

  function pasZoek() {
    const term = document.getElementById('search').value.trim().toLowerCase();
    const gd = Graph.graphData();

    if (!term) {
      zoekActief = false;
      for (const n of gd.nodes) n.color = n.baseColor;
      Graph.nodeColor('color');
      document.getElementById('search-count').style.display = 'none';
      return;
    }
    zoekActief = true;
    const artNr = term.replace(/^art\.?\s*/i, '').toLowerCase();

    const trefferIds = new Set(
      gd.nodes.filter(n =>
        (n.artikel && n.artikel.toLowerCase() === artNr) ||
        (term.length > 2 && n.label.toLowerCase() === `art. ${artNr}`) ||
        (term.length > 3 && n.group && n.group.toLowerCase().includes(term)) ||
        (term.length > 3 && n.wet && n.wet.toLowerCase().includes(term)) ||
        (term.length > 2 && n.leden?.some(l => l.tekst.toLowerCase().includes(term)))
      ).map(n => n.id)
    );

    const burenIds = new Set();
    for (const l of gd.links) {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      if (trefferIds.has(s)) burenIds.add(t);
      if (trefferIds.has(t)) burenIds.add(s);
    }
    for (const n of gd.nodes) {
      if (trefferIds.has(n.id))    n.color = n.baseColor;
      else if (burenIds.has(n.id)) n.color = '#ffffff';
      else                         n.color = '#1a2540';
    }
    Graph.nodeColor('color');

    const countEl = document.getElementById('search-count');
    if (trefferIds.size > 0) {
      countEl.textContent = trefferIds.size + ' resultaat' + (trefferIds.size !== 1 ? 'en' : '');
      countEl.style.display = 'inline';
    } else {
      countEl.style.display = 'none';
    }

    const eerste = gd.nodes.find(n => trefferIds.has(n.id));
    if (eerste?.x != null) {
      const dist = 120;
      const r = 1 + dist / (Math.hypot(eerste.x || 1, eerste.y || 1, eerste.z || 1));
      Graph.cameraPosition({ x: eerste.x * r, y: eerste.y * r, z: eerste.z * r }, eerste, 1800);
    }
  }

  function resetZoek() {
    document.getElementById('search').value = '';
    document.getElementById('search-count').style.display = 'none';
    zoekActief = false;
    for (const n of Graph.graphData().nodes) n.color = n.baseColor;
    Graph.nodeColor('color');
  }

  // ── 7. Tooltip ────────────────────────────────────────────────────────────────

  const tooltip = document.getElementById('tooltip');

  function handleHover(node) {
    if (!node) { tooltip.style.display = 'none'; return; }
    const wetNaam = node.wet ?? node.wetNaam ?? '';
    tooltip.style.display = 'block';
    const typeLabel = node.type === 'wet' ? 'Wet' : node.type === 'sectie' ? (node.sectieType ?? 'Sectie') : node.type;
    tooltip.innerHTML =
      `<strong>${node.label}</strong><br>` +
      (wetNaam && node.type !== 'wet' ? `<span class="tt-wet">${wetNaam}</span><br>` : '') +
      (node.type === 'intern' || node.type === 'extern' ? `${node.group}<br>` : `<span style="color:#a78bfa">${typeLabel}</span><br>`) +
      `<span class="tt-ref">${node.bronreferentie}</span><br>` +
      `Verbindingen: ${node.grad ?? 0}`;
  }
  document.addEventListener('mousemove', e => {
    if (tooltip.style.display === 'none') return;
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top  = (e.clientY - 10) + 'px';
  });

  // ── 8. Knoop-tab ─────────────────────────────────────────────────────────────

  function mdNaarTekst(md) {
    return md
      .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
      .replace(/\*\*([^*]+)\*\*/g, '$1')
      .replace(/\*([^*]+)\*/g, '$1')
      .replace(/#{1,6}\s/g, '')
      .trim();
  }

  function handleClick(node) {
    // Vul knoop-inhoud
    document.getElementById('info-label').textContent = node.label;
    document.getElementById('info-group').textContent = node.group;
    document.getElementById('info-ref').textContent   = node.bronreferentie;
    document.getElementById('info-grad').textContent  = node.grad ?? 0;

    const wetEl = document.getElementById('info-wet');
    const wetNaam = node.wet ?? node.wetNaam;
    if (wetNaam) { wetEl.textContent = wetNaam; wetEl.style.display = 'inline-block'; }
    else         { wetEl.style.display = 'none'; }

    const padEl = document.getElementById('info-pad');
    if (node.padVolledig) { padEl.textContent = node.padVolledig; padEl.style.display = 'block'; }
    else                  { padEl.style.display = 'none'; }

    const tekstEl = document.getElementById('info-tekst');
    if (node.leden?.length) {
      tekstEl.innerHTML = node.leden.map(l => {
        const tekst = mdNaarTekst(l.tekst);
        const lidLabel = node.aantalLeden > 1 ? `Lid ${l.lid}` : 'Tekst';
        return `<div class="lid-blok"><div class="lid-nr">${lidLabel}</div><div class="lid-tekst">${tekst}</div></div>`;
      }).join('');
    } else if (node.type === 'wet') {
      tekstEl.innerHTML = `<div class="lid-tekst" style="color:#a78bfa">Wet — overkoepelende structuurknoop</div>`;
    } else if (node.type === 'sectie') {
      const titel = node.sectionTitel ? `<div class="lid-tekst" style="color:#a8c4e0;margin-top:4px">${node.sectionTitel}</div>` : '';
      tekstEl.innerHTML = `<div class="lid-tekst" style="color:#a78bfa">${node.sectieType ?? 'Sectie'} ${node.sectionNr ?? ''}</div>${titel}`;
    } else if (node.wetNaam) {
      tekstEl.innerHTML = `<div class="lid-tekst" style="color:#6a8daa">Externe wet: ${node.wetNaam}</div>`;
    } else {
      tekstEl.innerHTML = '';
    }

    const links = linksVanNode.get(node.id) ?? [];
    const uit = links.filter(x => x.richting === 'uit');
    const ins = links.filter(x => x.richting === 'in');
    let html = '';
    if (uit.length) {
      html += `<div style="color:#6a8daa;font-size:10px;margin-bottom:2px">Verwijst naar (${uit.length})</div>`;
      for (const { link } of uit.slice(0, 25)) {
        const id = typeof link.target === 'object' ? link.target.id : link.target;
        const lbl = nodeById.get(id)?.label ?? id;
        html += `<div class="link-item ${link.soort}"><span class="arrow">→</span>${lbl}<span style="color:#555"> (${link.soort})</span></div>`;
      }
      if (uit.length > 25) html += `<div style="color:#555">… +${uit.length - 25}</div>`;
    }
    if (ins.length) {
      html += `<div style="color:#6a8daa;font-size:10px;margin-top:5px;margin-bottom:2px">Aangehaald door (${ins.length})</div>`;
      for (const { link } of ins.slice(0, 25)) {
        const id = typeof link.source === 'object' ? link.source.id : link.source;
        const lbl = nodeById.get(id)?.label ?? id;
        html += `<div class="link-item ${link.soort}"><span class="arrow">←</span>${lbl}<span style="color:#555"> (${link.soort})</span></div>`;
      }
      if (ins.length > 25) html += `<div style="color:#555">… +${ins.length - 25}</div>`;
    }
    if (!html) html = '<span style="color:#6a8daa">Geen verwijzingen</span>';
    document.getElementById('info-links').innerHTML = html;

    // Toon inhoud, verberg placeholder
    document.getElementById('knoop-placeholder').style.display = 'none';
    document.getElementById('knoop-inhoud').style.display = 'block';

    // Schakel naar knoop-tab
    activeerTab('knoop');

    // Camera inzoomen
    if (node.x != null) {
      const dist = 100;
      const r = 1 + dist / (Math.hypot(node.x || 1, node.y || 1, node.z || 1));
      Graph.cameraPosition({ x: node.x * r, y: node.y * r, z: node.z * r }, node, 1000);
    }
  }

  // ── 9. Tab-wisseling ─────────────────────────────────────────────────────────

  function activeerTab(naam) {
    document.querySelectorAll('.tab-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.tab === naam));
    document.querySelectorAll('.tab-panel').forEach(p =>
      p.classList.toggle('active', p.id === 'tab-' + naam));
  }
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.addEventListener('click', () => activeerTab(b.dataset.tab)));

  // ── 10. Legenda ───────────────────────────────────────────────────────────────

  function bouwLegenda() {
    let html = '';
    for (let wi = 0; wi < wetten.length; wi++) {
      const wet = wetten[wi];
      const wetGroepen = [...new Set(
        raw.nodes.filter(n => n.type === 'intern' && n.bwbId === wet.bwbId).map(n => n.group)
      )];
      const korteNaam = wet.citeertitel.length > 32 ? wet.citeertitel.slice(0, 30) + '…' : wet.citeertitel;
      html += `<h4>${korteNaam}</h4>`;
      for (const g of wetGroepen.slice(0, 12)) {
        const kleur = groepKleur.get(wet.bwbId + '#' + g) ?? '#888';
        html += `<div class="leg-row"><div class="leg-dot" style="background:${kleur}"></div>${g}</div>`;
      }
      if (wi < wetten.length - 1) html += '<hr class="leg-sep">';
    }
    const externGroepen = [...new Set(raw.nodes.filter(n => n.type === 'extern').map(n => n.bwbId || n.group))];
    if (externGroepen.length) {
      html += '<hr class="leg-sep"><h4>Externe wetten</h4>';
      for (const g of externGroepen.slice(0, 10)) {
        const kleur = groepKleur.get(g) ?? '#888';
        const naam = raw.nodes.find(n => (n.bwbId || n.group) === g)?.group ?? g;
        const kort = naam.length > 28 ? naam.slice(0, 26) + '…' : naam;
        html += `<div class="leg-row"><div class="leg-dot" style="background:${kleur}"></div>${kort}</div>`;
      }
    }
    html += '<hr class="leg-sep">';
    html += '<div class="leg-row"><div class="leg-line" style="background:#60a5fa"></div>Interne verwijzing</div>';
    if (raw.links.some(l => l.soort === 'koppeling'))
      html += '<div class="leg-row"><div class="leg-line" style="background:#ffd166"></div>Koppeling (cross-wet)</div>';
    html += '<div class="leg-row"><div class="leg-line" style="background:#fb923c"></div>Externe verwijzing</div>';
    if (raw.links.some(l => l.soort === 'structuur')) {
      html += '<hr class="leg-sep">';
      html += '<h4>Structuur (filter aan)</h4>';
      html += '<div class="leg-row"><div class="leg-dot" style="background:#f1f5f9;border:1px solid #475569"></div>Wet (root)</div>';
      html += '<div class="leg-row"><div class="leg-dot" style="background:#94a3b8"></div>Hoofdstuk / Deel / Titel</div>';
      html += '<div class="leg-row"><div class="leg-dot" style="background:#64748b"></div>Afdeling / Paragraaf</div>';
      html += '<div class="leg-row"><div class="leg-line" style="background:#a78bfa"></div>Structuurlink (bevat)</div>';
    }
    document.getElementById('tab-legenda').innerHTML = html;
  }
  bouwLegenda();

  // ── 11. Overzicht ─────────────────────────────────────────────────────────────

  function bouwMeta() {
    const m = raw.metadata ?? {};
    const wln = m.wetten ?? (m.wet ? [{ bwbId: m.bwbId ?? '', citeertitel: m.wet }] : []);
    const nIntern = raw.nodes.filter(n => n.type === 'intern').length;
    const nExtern = raw.nodes.filter(n => n.type === 'extern').length;
    const nIntref   = raw.links.filter(l => l.soort === 'intref').length;
    const nKop      = raw.links.filter(l => l.soort === 'koppeling').length;
    const nExtref   = raw.links.filter(l => l.soort === 'extref').length;
    const nStruct   = raw.links.filter(l => l.soort === 'structuur').length;
    let html = '';
    for (const w of wln) {
      html += `<div class="meta-row"><strong>${w.citeertitel}</strong></div>`;
      html += `<div class="meta-row sub">${w.bwbId}</div>`;
    }
    html += '<hr class="leg-sep">';
    html += `<div class="meta-row">Nodes: <strong>${m.aantalNodes ?? '?'}</strong> <span>(${nIntern} intern · ${nExtern} extern)</span></div>`;
    const linkDetail = `${nIntref} intref · ${nKop} koppeling · ${nExtref} extref` + (nStruct ? ` · ${nStruct} structuur` : '');
    html += `<div class="meta-row">Links: <strong>${m.aantalLinks ?? '?'}</strong> <span>(${linkDetail})</span></div>`;
    html += `<div class="meta-row sub" style="margin-top:4px">Peildatum: ${m.peildatum ?? '—'}</div>`;
    document.getElementById('tab-overzicht').innerHTML = html;
  }
  bouwMeta();

  // ── 12. Event-listeners ───────────────────────────────────────────────────────

  document.getElementById('show-intern').addEventListener('change', pasFilter);
  document.getElementById('show-koppeling').addEventListener('change', pasFilter);
  document.getElementById('show-extern').addEventListener('change', pasFilter);
  document.getElementById('show-structuur').addEventListener('change', pasFilter);
  document.getElementById('show-isolated').addEventListener('change', pasFilter);
  document.getElementById('search').addEventListener('input', pasZoek);
  document.getElementById('btn-reset').addEventListener('click', resetZoek);

})();
</script>
</body>
</html>
