# Portainer-stack voor de Wetsanalyse-frontend, achter Nginx Proxy Manager — spiegelt de
# API- en MCP-stack.
#
# De image komt van GHCR (zie .github/workflows/frontend-docker-publish.yml). De container
# publiceert GÉÉN host-poort: NPM bereikt 'm via het gedeelde Docker-netwerk op hostnaam
# `wetsanalyse-frontend`, poort 3000. De frontend (BFF) praat intern met de API op
# `wetsanalyse-api:3000` — de browser ziet de API nooit rechtstreeks.
#
# In NPM → Proxy Hosts → Add: Domain `wetsanalyse.ipalm.nl`, Scheme `http`,
# Forward Hostname `wetsanalyse-frontend`, Forward Port `3000`, SSL (Let's Encrypt) aan.
# Belangrijk voor SSE: zet in NPM (Advanced) proxy buffering uit, bv.
#   proxy_buffering off;
#   proxy_read_timeout 3600s;
#
# Stack-omgeving (in Portainer, of door CI via stack-update meegegeven):
#   PROXY_NETWORK  — naam van het bestaande NPM-netwerk (default homeinfra_internal).
#   SECRETS_DIR    — host-pad naar de secrets-map (gedeeld met de API-stack).
#
# Drie extra secret-bestanden t.o.v. de API-stack, op de host in SECRETS_DIR (mode 644):
#   frontend_api_token    — ALLEEN de tokenwaarde (het deel NA de ":") van een entry in de
#                           API-tokenlijst (api_tokens). Voeg daar bv. "frontend:<token>" toe en
#                           zet dan louter "<token>" in dit bestand.
#   frontend_admin_token  — idem maar de tokenwaarde uit de admin-tokenlijst (admin_tokens),
#                           voor het /beheer-scherm (→ /v1/admin/*).
#   frontend_auth_secret  — geheim voor de login-sessie (Auth.js). Genereer met
#                           `openssl rand -base64 32`. De entrypoint laadt dit in AUTH_SECRET.
#                           (2FA hergebruikt de API-secret llm_config_secret; geen extra bestand.)
services:
  wetsanalyse-frontend:
    image: ghcr.io/palmw01/wetsanalyse-frontend:latest
    container_name: wetsanalyse-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      API_BASE_URL: "http://wetsanalyse-api:3000"
      API_TOKEN_FILE: /run/secrets/frontend_api_token
      ADMIN_API_TOKEN_FILE: /run/secrets/frontend_admin_token
      AUTH_SECRET_FILE: /run/secrets/frontend_auth_secret
      NODE_ENV: production
    volumes:
      - ${SECRETS_DIR:-/opt/secrets/wetsanalyse-api}:/run/secrets:ro
    networks:
      - proxy
    # Resource-limieten: begrenzen een ontspoorde Node-server zodat één container de host niet leegtrekt.
    mem_limit: 1g
    pids_limit: 256
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK:-homeinfra_internal}
