[project]
name = "wetsanalyse-api"
version = "0.1.0"
description = "Deployable API-backend voor de Wetsanalyse (JAS) — orchestreert de skill headless."
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn>=0.30",
    "pydantic>=2.7",
    "httpx>=0.27",
]

[project.optional-dependencies]
# LiteLLM (LLM-adapter) en mcp (MCP-client) zijn alleen nodig voor de engine (Fase 0 spike +
# Fase 2). Beide worden lazy geïmporteerd, zodat Fase 1 (read/serve) en de tests zonder deze
# (zwaardere) dependencies draaien.
llm = ["litellm>=1.50", "mcp>=1.2"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-httpx>=0.30",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.uv]
package = false
