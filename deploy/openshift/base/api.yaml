apiVersion: apps/v1
kind: Deployment
metadata:
  name: wetsanalyse-api
  labels:
    app.kubernetes.io/name: wetsanalyse-api
    app.kubernetes.io/part-of: wetsanalyse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wetsanalyse-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wetsanalyse-api
        app.kubernetes.io/part-of: wetsanalyse
    spec:
      # restricted-v2 SCC: geen vaste runAsUser — OpenShift kent een namespace-UID toe (gid 0).
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/palmw01/wetsanalyse-api:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: wetsanalyse-api-config
          env:
            # Connection-string uit de CloudNativePG-app-secret (postgresql://… → db.py normaliseert
            # naar asyncpg). Naam = <cluster>-app; zie components/postgres-cnpg.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: wetsanalyse-db-app
                  key: uri
            # Secrets als bestanden (zelfde *_FILE-patroon als compose); gemount op /run/secrets.
            - name: WETSANALYSE_API_TOKENS_FILE
              value: /run/secrets/api_tokens
            - name: WETSANALYSE_ADMIN_TOKENS_FILE
              value: /run/secrets/admin_tokens
            - name: WETTENBANK_TOKEN_FILE
              value: /run/secrets/wettenbank_token
            - name: LLM_API_KEY_FILE
              value: /run/secrets/llm_api_key
            - name: LLM_CONFIG_SECRET_FILE
              value: /run/secrets/llm_config_secret
            - name: HOME
              value: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: secrets
              mountPath: /run/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: secrets
          secret:
            secretName: wetsanalyse-api-secrets
            defaultMode: 0440
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: wetsanalyse-api
  labels:
    app.kubernetes.io/name: wetsanalyse-api
    app.kubernetes.io/part-of: wetsanalyse
spec:
  selector:
    app.kubernetes.io/name: wetsanalyse-api
  ports:
    - port: 3000
      targetPort: 3000
