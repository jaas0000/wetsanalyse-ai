apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace-agnostische base: de drie services + niet-geheime config. De namespace, image-pins,
# CNPG-database, replicas/HPA/PDB en NetworkPolicies komen uit de overlays. Secrets worden buiten
# Kustomize aangemaakt (zie deploy/openshift/INSTALL.md) — ze staan bewust niet in de repo.
resources:
  - configmap.yaml
  - api.yaml
  - frontend.yaml
  - mcp.yaml
