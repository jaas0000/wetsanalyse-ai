apiVersion: apps/v1
kind: Deployment
metadata:
  name: wetsanalyse-frontend
  labels:
    app.kubernetes.io/name: wetsanalyse-frontend
    app.kubernetes.io/part-of: wetsanalyse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wetsanalyse-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wetsanalyse-frontend
        app.kubernetes.io/part-of: wetsanalyse
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: ghcr.io/palmw01/wetsanalyse-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            # BFF → API intern (ClusterIP-service). Token blijft server-side (zie frontend/CLAUDE.md).
            - name: API_BASE_URL
              value: http://wetsanalyse-api:3000
            - name: API_TOKEN_FILE
              value: /run/secrets/frontend_api_token
            - name: ADMIN_API_TOKEN_FILE
              value: /run/secrets/frontend_admin_token
            - name: HOME
              value: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: secrets
              mountPath: /run/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: secrets
          secret:
            secretName: wetsanalyse-frontend-secrets
            defaultMode: 0440
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: wetsanalyse-frontend
  labels:
    app.kubernetes.io/name: wetsanalyse-frontend
    app.kubernetes.io/part-of: wetsanalyse
spec:
  selector:
    app.kubernetes.io/name: wetsanalyse-frontend
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: wetsanalyse-frontend
  labels:
    app.kubernetes.io/name: wetsanalyse-frontend
    app.kubernetes.io/part-of: wetsanalyse
  annotations:
    # SSE: lange read-timeout zodat de dashboard-/voortgangsstream niet door de router wordt
    # afgekapt (vervangt NPM's `proxy_read_timeout 3600s`). De BFF zet zelf X-Accel-Buffering: no.
    haproxy.router.openshift.io/timeout: 3600s
spec:
  to:
    kind: Service
    name: wetsanalyse-frontend
  port:
    targetPort: 3000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
