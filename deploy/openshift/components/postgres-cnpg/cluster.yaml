# CloudNativePG-cluster (vereist dat de CNPG-operator cluster-wide door het platformteam is
# geïnstalleerd: `oc get crd clusters.postgresql.cnpg.io`). Wij maken alleen dit namespaced CR.
#
# De operator genereert automatisch de secret `wetsanalyse-db-app` met o.a. de sleutel `uri`
# (postgresql://user:pass@host:5432/wetsanalyse) — de API leest die als DATABASE_URL (db.py
# normaliseert naar de asyncpg-driver).
#
# Geen S3-backup/WAL-archivering: de database leunt op de PVC-storage. Wil je er later toch
# off-cluster backups bij, voeg dan een `spec.backup.barmanObjectStore` + `ScheduledBackup` toe
# (plus de secret `wetsanalyse-db-backup-s3`).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: wetsanalyse-db
  labels:
    app.kubernetes.io/part-of: wetsanalyse
spec:
  instances: 2
  primaryUpdateStrategy: unsupervised

  bootstrap:
    initdb:
      database: wetsanalyse
      owner: wetsanalyse

  storage:
    size: 5Gi
