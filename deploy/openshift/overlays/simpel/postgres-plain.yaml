# Kale PostgreSQL in de namespace — geen CNPG-operator, niets cluster-wide. Bewust simpel: één
# instance + één PVC, geen backup, geen HA. Het wachtwoord komt uit het secret `wetsanalyse-db-app`
# (sleutel `password`); de API leest uit datzelfde secret de `uri`. Zo staat er geen wachtwoord in de
# repo en hoef je maar één DB-secret aan te maken.
#
# LET OP (restricted-v2 SCC): de officiële postgres:16-image verwacht een vaste UID en start mogelijk
# niet onder een willekeurige namespace-UID. Werkt zeker op een permissieve cluster (CRC/local). Loopt
# de pod vast op een UID-/permissiefout, kies dan de arbitrary-UID-variant (zie INSTALL.md).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wetsanalyse-db-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wetsanalyse-db
  labels:
    app.kubernetes.io/name: wetsanalyse-db
    app.kubernetes.io/part-of: wetsanalyse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wetsanalyse-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wetsanalyse-db
        app.kubernetes.io/part-of: wetsanalyse
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_USER
              value: wetsanalyse
            - name: POSTGRES_DB
              value: wetsanalyse
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wetsanalyse-db-app
                  key: password
            # PGDATA in een subdir: de PVC-mount-root kan een lost+found bevatten waar initdb over valt.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "wetsanalyse", "-d", "wetsanalyse"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: wetsanalyse-db-data
---
# Servicenaam = wetsanalyse-db-rw zodat de connection-uri (…@wetsanalyse-db-rw:5432…) dezelfde vorm
# houdt als de CNPG-app-secret; overlays kunnen zo wisselen zonder de uri aan te passen.
apiVersion: v1
kind: Service
metadata:
  name: wetsanalyse-db-rw
  labels:
    app.kubernetes.io/part-of: wetsanalyse
spec:
  selector:
    app.kubernetes.io/name: wetsanalyse-db
  ports:
    - port: 5432
      targetPort: 5432
