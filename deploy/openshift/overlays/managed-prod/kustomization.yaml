apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Gedeelde managed on-prem cluster (eigen namespace). HA (replicas ≥2 + PDB), HPA, NetworkPolicy
# default-deny, en CloudNativePG. Secrets worden buiten Kustomize aangemaakt (zie INSTALL.md).
namespace: wetsanalyse-prod

resources:
  - ../../base
  - hpa.yaml
  - pdb.yaml
  - networkpolicy.yaml

components:
  - ../../components/postgres-cnpg

patches:
  - target:
      kind: ConfigMap
      name: wetsanalyse-api-config
    patch: |-
      - op: replace
        path: /data/LLM_MODEL
        value: "claude-sonnet-4-6"
      - op: replace
        path: /data/LLM_API_BASE
        value: "https://CHANGEME.services.ai.azure.com"
  # HA: minstens twee replica's van de stateless services.
  - target:
      kind: Deployment
      name: wetsanalyse-api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: wetsanalyse-frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: wettenbank-mcp
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
