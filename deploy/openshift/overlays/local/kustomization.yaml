apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Learn-/CRC-overlay: één commando voor een smoke-test. Kale Postgres i.p.v. CNPG, en dev-secrets
# worden hier gegenereerd (auth uit). NIET voor productie — daar gelden de beproeving/managed-prod-
# overlays met CloudNativePG en buiten-Kustomize aangemaakte secrets.
namespace: wetsanalyse-local

resources:
  - ../../base
  - postgres-plain.yaml

patches:
  # Auth uit + een dummy-model zodat /ready groen is en je zonder tokens kunt klikken.
  - target:
      kind: ConfigMap
      name: wetsanalyse-api-config
    patch: |-
      - op: replace
        path: /data/WETSANALYSE_AUTH_REQUIRED
        value: "0"
      - op: replace
        path: /data/LLM_MODEL
        value: "claude-sonnet-4-6"

secretGenerator:
  # Connection-string voor de kale Postgres (mirrort de sleutel `uri` van de CNPG-app-secret).
  - name: wetsanalyse-db-app
    literals:
      - uri=postgresql://wetsanalyse:wetsanalyse@wetsanalyse-db-rw:5432/wetsanalyse
  - name: wetsanalyse-api-secrets
    literals:
      - api_tokens=lokaal:dev-token
      - admin_tokens=admin:dev-admin-token
      - wettenbank_token=dev-mcp-token
      - llm_api_key=
      - llm_config_secret=
  - name: wetsanalyse-frontend-secrets
    literals:
      - frontend_api_token=dev-token
      - frontend_admin_token=dev-admin-token
  - name: wettenbank-mcp-secrets
    literals:
      - mcp_auth_tokens=lokaal:dev-mcp-token

generatorOptions:
  disableNameSuffixHash: true
