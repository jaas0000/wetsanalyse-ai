# Prometheus — scrapet de metrics die de OTel-Collector exporteert (de app-OTLP-metrics).
# Grafana Prometheus-datasource-URL: http://prometheus:9090

global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]   # de prometheus-exporter van de collector
