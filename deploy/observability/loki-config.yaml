# Loki (single-binary, filesystem-opslag) — ontvangt logs via het native OTLP-endpoint
# (/otlp/v1/logs, Loki 3.x) en serveert queries op :3100 (Grafana Loki-datasource: http://loki:3100).

auth_enabled: false

server:
  http_listen_port: 3100

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true   # vereist voor OTLP-ingest
  volume_enabled: true
  retention_period: 168h            # logs 7 dagen bewaren (homelab)
