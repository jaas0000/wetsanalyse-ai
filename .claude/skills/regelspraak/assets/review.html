<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RegelSpraak — Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&family=Source+Serif+4:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8; --panel: #fffcf6; --ink: #1c1917; --muted: #6b6560;
    --line: #ddd5c8; --rule-ink: #c4b9a8;
    --accent: #1f4e79; --accent-light: #2d6aa0; --accent-ink: #f5faff;
    --ok: #2d6a4f; --gold: #8b6914; --gold-light: #fef3c7;
    --chip: #ede7db; --field: #faf6ee;
    --rs-ot: #6d28d9; --rs-attr: #2d6a4f; --rs-kenmerk: #c2700f; --rs-rol: #1d4ed8;
    --serif: 'Source Serif 4', 'Georgia', serif;
    --display: 'Newsreader', 'Georgia', serif;
    --sans: 'Outfit', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --rule: 1px solid var(--rule-ink);
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font: 15px/1.65 var(--serif);
         -webkit-font-smoothing: antialiased; }
  header { position: sticky; top: 0; z-index: 5; background: var(--panel);
           border-bottom: var(--rule); box-shadow: 0 1px 0 0 var(--rule-ink); padding: 14px 32px; }
  header h1 { margin: 0; font-family: var(--display); font-weight: 500; font-size: 23px;
              color: var(--accent); letter-spacing: -0.02em; line-height: 1.15; }
  header .sub { color: var(--muted); font-family: var(--sans); font-size: 12.5px; margin-top: 5px; }
  main { max-width: 900px; margin: 0 auto; padding: 28px 24px 24px; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-top: 2px solid var(--rule-ink);
           padding: 22px 26px; margin-bottom: 20px; }
  .panel > h2 { margin: 0 0 14px; font-family: var(--sans); font-size: 11px; font-weight: 600;
                text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent);
                border-bottom: 1px solid var(--line); padding-bottom: 6px; }
  .item { border: 1px solid var(--line); border-left: 3px solid var(--accent);
          padding: 14px 18px; margin-bottom: 12px; background: var(--panel); }
  .item .top { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .item .id { font-family: var(--sans); font-weight: 700; font-size: 12px; color: var(--accent); }
  .item .top strong { font-family: var(--display); font-weight: 500; font-size: 16px; }
  .chip { background: var(--chip); border: 1px solid #d4cab8; padding: 2px 10px;
          font-family: var(--sans); font-size: 11px; font-weight: 600;
          letter-spacing: 0.04em; text-transform: uppercase; color: var(--accent); }
  .meta { color: var(--muted); font-size: 13.5px; }
  .grid { display: grid; grid-template-columns: max-content 1fr; gap: 3px 14px;
          font-size: 13.5px; margin: 7px 0; }
  .grid > * { min-width: 0; overflow-wrap: anywhere; }
  .grid .lbl { font-family: var(--sans); color: var(--muted); font-weight: 600; font-size: 12px; }
  pre { background: #fbfaf7; color: var(--ink); border: 1px solid var(--line);
        padding: 11px 13px; overflow-x: auto; font-family: var(--mono); font-size: 12.5px;
        line-height: 1.55; margin: 8px 0; white-space: pre-wrap; overflow-wrap: anywhere; }
  .rs-ot { color: var(--rs-ot); font-weight: 500; }
  .rs-attr { color: var(--rs-attr); }
  .rs-kenmerk { color: var(--rs-kenmerk); }
  .rs-rol { color: var(--rs-rol); }
  .rs-kw { font-weight: 700; color: #111; }
  textarea { width: 100%; min-height: 52px; resize: vertical; margin-top: 9px;
             border: 1px solid var(--rule-ink); padding: 9px 12px;
             font: 15px/1.55 var(--serif); background: var(--field); color: var(--ink); }
  textarea::placeholder { color: #a99f93; font-style: italic; }
  textarea:focus { outline: none; border-color: var(--accent); background: #fffdf7; }
  .actions { position: sticky; bottom: 0; background: var(--panel); border-top: 2px solid var(--rule-ink);
             padding: 14px 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  button { font-family: var(--sans); font-size: 13px; font-weight: 500; padding: 9px 18px;
           cursor: pointer; border: 1px solid var(--rule-ink); background: var(--panel); color: var(--ink); }
  button:hover { background: var(--chip); }
  button.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  button.ok { background: var(--ok); color: #fff; border-color: var(--ok); }
  .status { color: var(--muted); font-family: var(--sans); font-size: 13px; }
  .status.done { color: var(--ok); font-weight: 600; }
  .panel.banner { background: var(--gold-light); border: 1px solid #e5d5a0; border-left: 3px solid var(--gold);
                  color: #724c0a; font-size: 14px; }
  .panel.banner b { font-family: var(--display); font-weight: 500; color: var(--gold); }
  details.vorige { margin-top: 10px; padding-top: 8px; border-top: 1px dashed var(--line); }
  details.vorige summary { font-size: 12px; color: var(--muted); text-transform: uppercase;
                           letter-spacing: 0.06em; cursor: pointer; }
</style>
</head>
<body>
<header>
  <h1 id="title">RegelSpraak — Review</h1>
  <div class="sub" id="subtitle"></div>
</header>
<main id="main"></main>
<div class="actions">
  <button class="primary" id="btn-verstuur">Akkoord — geen wijzigingen</button>
  <span class="status" id="status">Concept wordt lokaal bewaard tijdens het typen.</span>
</div>

<script>
/*__EMBEDDED_DATA__*/

const M = EMBEDDED_DATA.model || {};
const STAP = String(EMBEDDED_DATA.stap || "gegevensspraak");
const RONDE = Number(EMBEDDED_DATA.ronde) || 1;
const VORIGE = EMBEDDED_DATA.vorige || null;
const DRAFT_KEY = "regelspraak-review-" + STAP + "-ronde" + RONDE;

const VORIGE_FEEDBACK = (VORIGE && VORIGE.feedback && VORIGE.feedback.items) || {};
const VORIGE_ALGEMEEN = (VORIGE && VORIGE.feedback && VORIGE.feedback.algemeen) || "";

function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// RegelSpraak-syntaxkleuring (spec §2.2). Bouw naam-verzamelingen uit het model; werkt voor
// zowel de volledige gegevensspraak als de lichte gegevensspraak_index in de regels-stap.
function buildNames(model) {
  const gs = model.gegevensspraak || {};
  const idx = model.gegevensspraak_index || {};
  const ot = [], attr = [], kenmerk = [], rol = [], par = [];
  for (const o of (gs.objecttypen || idx.objecttypen || [])) {
    if (o.naam) ot.push(o.naam);
    for (const a of (o.attributen || [])) if (a.naam) attr.push(a.naam);
    for (const k of (o.kenmerken || [])) if (k.naam) kenmerk.push(k.naam);
  }
  for (const f of (gs.feittypen || idx.feittypen || [])) {
    for (const r of (f.rollen || [])) {
      if (typeof r === "string") rol.push(r);
      else if (r && r.naam) rol.push(r.naam);
    }
  }
  for (const p of (gs.parameters || idx.parameters || [])) if (p.naam) par.push(p.naam);
  return { ot, attr, kenmerk, rol, par };
}
const NAMES = buildNames(M);

const RS_KEYWORDS = [
  "Objecttype", "Domein", "Parameter", "Feittype", "Wederkerig feittype",
  "Eenheidssysteem", "Dimensie", "Tijdlijn", "Dagsoort", "Extensie van objecttype",
  "Regel", "geldig altijd", "geldig vanaf", "geldig t/m", "indien",
  "gedurende de tijd dat", "Daarbij geldt", "moet berekend worden als",
  "moet gesteld worden op", "moet voldoen aan", "kenmerk", "bezittelijk",
  "bijvoeglijk", "bezield",
];

function escapeRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }

// Kleur de tekst: eerst de modelnamen (langste eerst, om deelmatches te voorkomen), daarna de
// structurele sleutelwoorden. We parkeren elke gekleurde span achter een ASCII-sentinel
// (@@RS<i>@@; '@' komt niet voor in RegelSpraak) zodat een latere vervanging er niet in knipt
// en losse getallen in de tekst nooit als placeholder worden teruggelezen.
function colorize(text) {
  let s = esc(text);
  const slots = [];
  function stash(html) { slots.push(html); return "@@RS" + (slots.length - 1) + "@@"; }

  const groepen = [
    [NAMES.ot, "rs-ot"], [NAMES.par, "rs-rol"], [NAMES.rol, "rs-rol"],
    [NAMES.kenmerk, "rs-kenmerk"], [NAMES.attr, "rs-attr"],
  ];
  const phrases = [];
  for (const [lijst, cls] of groepen)
    for (const naam of lijst) if (naam) phrases.push([esc(naam), cls]);
  phrases.sort((a, b) => b[0].length - a[0].length);
  for (const [phrase, cls] of phrases) {
    if (!phrase) continue;
    const re = new RegExp("(^|[^\\w-])(" + escapeRe(phrase) + ")(?![\\w-])", "g");
    s = s.replace(re, (m, pre, p) => pre + stash('<span class="' + cls + '">' + p + "</span>"));
  }
  const kw = RS_KEYWORDS.slice().sort((a, b) => b.length - a.length);
  for (const k of kw) {
    const re = new RegExp("(^|[^\\w-])(" + escapeRe(esc(k)) + ")(?![\\w-])", "g");
    s = s.replace(re, (m, pre, p) => pre + stash('<span class="rs-kw">' + p + "</span>"));
  }
  s = s.replace(/@@RS(\d+)@@/g, (m, i) => slots[Number(i)]);
  return s;
}

function fb(id) {
  return `<textarea data-fid="${esc(id)}" placeholder="Feedback / correctie (laat leeg = akkoord)"></textarea>`;
}
function vorigeFb(id) {
  const v = VORIGE_FEEDBACK[id];
  if (!v) return "";
  return `<details class="vorige"><summary>Vorige ronde</summary>
    <div class="meta" style="margin-top:8px"><span class="lbl">Jouw vorige feedback:</span> ${esc(v)}</div></details>`;
}
function herkomstText(h) {
  if (!h) return "";
  const vps = (h.vindplaatsen || []).map(vp =>
    (vp.bron_id || "") + (vp.lid ? " lid " + vp.lid : "")).filter(Boolean).join("; ");
  const ref = h.begrip_ids ? "begrip " + (h.begrip_ids || []).join(", ")
            : h.regel_id ? "regel " + h.regel_id : "";
  return [ref, vps].filter(Boolean).join(" · ");
}

function renderHeader() {
  const wg = M.werkgebied || {};
  document.getElementById("title").textContent =
    "RegelSpraak — Review " +
    (STAP === "gegevensspraak" ? "GegevensSpraak (objectmodel)" : "RegelSpraak-regels") +
    (RONDE > 1 ? " — ronde " + RONDE : "");
  document.getElementById("subtitle").textContent =
    [wg.naam, wg.scoping].filter(Boolean).join(" · ");
}
function renderBanner() {
  if (RONDE <= 1) return "";
  return `<div class="panel banner"><b>Ronde ${RONDE}</b> — herziening na je feedback.
    Klap per item "Vorige ronde" open om te zien wat je vroeg, en bevestig of het verwerkt is.</div>`;
}

function renderSimpleDecls(titel, lijst, prefix) {
  if (!lijst || !lijst.length) return "";
  const items = lijst.map((d, i) => {
    const id = d.id || (prefix + "__" + (d.naam || i));
    return `<div class="item">
      <div class="top"><span class="id">${esc(d.naam || id)}</span></div>
      ${d.regelspraak_tekst ? `<pre>${colorize(d.regelspraak_tekst)}</pre>` : ""}
      ${fb(id)}${vorigeFb(id)}</div>`;
  }).join("");
  return `<div class="panel"><h2>${esc(titel)} (${lijst.length})</h2>${items}</div>`;
}

function renderObjecttypen() {
  const ots = (M.gegevensspraak || {}).objecttypen || [];
  if (!ots.length) return "";
  const items = ots.map(o => {
    const attr = (o.attributen || []).map(a =>
      `<span class="lbl">${esc(a.naam)}</span><span>${esc(a.datatype || "")}${a.eenheid ? " · " + esc(a.eenheid) : ""}</span>`).join("");
    const kenm = (o.kenmerken || []).map(k =>
      `<span class="lbl">${esc(k.naam)}</span><span>kenmerk${k.soort ? " (" + esc(k.soort) + ")" : ""}</span>`).join("");
    const hid = o.id || ("ot__" + o.naam);
    return `<div class="item">
      <div class="top"><span class="id">#${esc(o.id || "")}</span>
        ${o.bezield ? `<span class="chip">bezield</span>` : ""}
        <strong>${esc(o.naam)}</strong></div>
      ${(attr || kenm) ? `<div class="grid">${attr}${kenm}</div>` : ""}
      ${o.regelspraak_tekst ? `<pre>${colorize(o.regelspraak_tekst)}</pre>` : ""}
      ${herkomstText(o.herkomst) ? `<div class="meta"><span class="lbl">Herkomst:</span> ${esc(herkomstText(o.herkomst))}</div>` : ""}
      ${o.twijfel ? `<div class="meta"><span class="lbl">Twijfel:</span> ${esc(o.twijfel)}</div>` : ""}
      ${fb(hid)}${vorigeFb(hid)}</div>`;
  }).join("");
  return `<div class="panel"><h2>Objecttypen (${ots.length})</h2>${items}</div>`;
}

function renderFeittypen() {
  const fts = (M.gegevensspraak || {}).feittypen || [];
  if (!fts.length) return "";
  const items = fts.map(f => {
    const rollen = (f.rollen || []).map(r =>
      `<span class="lbl">${esc(r.naam)}</span><span>${esc(r.objecttype || "")} · ${esc(r.multipliciteit || "")}</span>`).join("");
    const hid = f.id || ("ft__" + f.naam);
    return `<div class="item">
      <div class="top"><span class="id">#${esc(f.id || "")}</span>
        ${f.wederkerig ? `<span class="chip">wederkerig</span>` : ""}
        <strong>${esc(f.naam)}</strong></div>
      ${rollen ? `<div class="grid">${rollen}</div>` : ""}
      ${f.regelspraak_tekst ? `<pre>${colorize(f.regelspraak_tekst)}</pre>` : ""}
      ${fb(hid)}${vorigeFb(hid)}</div>`;
  }).join("");
  return `<div class="panel"><h2>Feittypen en rollen (${fts.length})</h2>${items}</div>`;
}

function renderParameters() {
  const ps = (M.gegevensspraak || {}).parameters || [];
  if (!ps.length) return "";
  const items = ps.map(p => {
    const hid = p.id || ("par__" + p.naam);
    return `<div class="item">
    <div class="top"><span class="id">#${esc(p.id || "")}</span><strong>${esc(p.naam)}</strong></div>
    <div class="grid"><span class="lbl">Datatype</span><span>${esc(p.datatype || "")}${p.eenheid ? " · " + esc(p.eenheid) : ""}</span></div>
    ${p.regelspraak_tekst ? `<pre>${colorize(p.regelspraak_tekst)}</pre>` : ""}
    ${fb(hid)}${vorigeFb(hid)}</div>`;
  }).join("");
  return `<div class="panel"><h2>Parameters (${ps.length})</h2>${items}</div>`;
}

const SOORT_LABEL = {
  gelijkstelling: "Gelijkstelling", kenmerktoekenning: "Kenmerktoekenning",
  consistentieregel: "Consistentieregel", initialisatie: "Initialisatie",
  objectcreatie: "ObjectCreatie", feitcreatie: "FeitCreatie", verdeling: "Verdeling",
  dagsoortdefinitie: "Dagsoortdefinitie", startpuntbepaling: "Startpuntbepaling",
};
function renderRegels() {
  const rs = M.regels || [];
  const items = rs.map(r => `<div class="item">
    <div class="top"><span class="id">#${esc(r.id || "")}</span>
      <span class="chip">${esc(SOORT_LABEL[r.soort] || r.soort || "regel")}</span>
      <strong>${esc(r.naam)}</strong></div>
    ${r.regelspraak_tekst ? `<pre>${colorize(r.regelspraak_tekst)}</pre>` : ""}
    ${herkomstText(r.herkomst) ? `<div class="meta"><span class="lbl">Herkomst:</span> ${esc(herkomstText(r.herkomst))}</div>` : ""}
    ${r.twijfel ? `<div class="meta"><span class="lbl">Twijfel:</span> ${esc(r.twijfel)}</div>` : ""}
    ${fb(r.id)}${vorigeFb(r.id)}</div>`).join("");
  return `<div class="panel"><h2>RegelSpraak-regels (${rs.length})</h2>${items}</div>`;
}

function renderValidatie() {
  const vp = Array.isArray(M.validatiepunten) ? M.validatiepunten
    : (M.validatiepunten ? [M.validatiepunten] : []);
  if (!vp.length) return "";
  return `<div class="panel"><h2>Aandachtspunten voor validatie</h2>
    <ul style="margin:0;padding-left:20px">${vp.map(v =>
      `<li style="margin-bottom:6px;white-space:pre-wrap">${esc(v)}</li>`).join("")}</ul>${fb("validatiepunten")}</div>`;
}

function renderAlgemeen() {
  const vorig = VORIGE_ALGEMEEN
    ? `<div class="meta" style="margin-bottom:8px"><span class="lbl">Jouw vorige algemene feedback:</span> ${esc(VORIGE_ALGEMEEN)}</div>`
    : "";
  return `<div class="panel"><h2>Algemene feedback (stap ${esc(STAP)})</h2>${vorig}
    <textarea data-fid="__algemeen__" style="min-height:90px"
      placeholder="Algemene opmerkingen, ontbrekende declaraties/regels, methodische punten…"></textarea></div>`;
}

function render() {
  renderHeader();
  let html = renderBanner();
  if (STAP === "gegevensspraak") {
    const gs = M.gegevensspraak || {};
    html += renderSimpleDecls("Eenheidssystemen", gs.eenheidssystemen, "es");
    html += renderSimpleDecls("Domeinen", gs.domeinen, "dom");
    html += renderObjecttypen();
    html += renderFeittypen();
    html += renderParameters();
    html += renderSimpleDecls("Dimensies", gs.dimensies, "dim");
    html += renderSimpleDecls("Tijdlijnen", gs.tijdlijnen, "tl");
    html += renderSimpleDecls("Dagsoorten", gs.dagsoorten, "dag");
  } else {
    html += renderRegels() + renderValidatie();
  }
  html += renderAlgemeen();
  document.getElementById("main").innerHTML = html;
  restoreDraft();
  document.querySelectorAll("textarea").forEach(t =>
    t.addEventListener("input", () => { saveDraft(); updateButton(); }));
  updateButton();
}

// True zodra er ergens feedback staat (item-veld of het algemene veld).
function heeftFeedback() {
  const d = collect();
  return Object.keys(d.items).length > 0 || d.algemeen.trim() !== "";
}

// Eén knop, label beweegt mee zodat zichtbaar is wat versturen doet.
function updateButton() {
  document.getElementById("btn-verstuur").textContent =
    heeftFeedback() ? "Verstuur feedback" : "Akkoord — geen wijzigingen";
}

function collect() {
  const items = {};
  let algemeen = "";
  document.querySelectorAll("textarea").forEach(t => {
    const v = t.value.trim();
    if (!v) return;
    if (t.dataset.fid === "__algemeen__") algemeen = v;
    else items[t.dataset.fid] = v;
  });
  return { items, algemeen };
}
function saveDraft() { try { localStorage.setItem(DRAFT_KEY, JSON.stringify(collect())); } catch (e) {} }
function restoreDraft() {
  try {
    const d = JSON.parse(localStorage.getItem(DRAFT_KEY) || "{}");
    document.querySelectorAll("textarea").forEach(t => {
      if (t.dataset.fid === "__algemeen__" && d.algemeen) t.value = d.algemeen;
      else if (d.items && d.items[t.dataset.fid]) t.value = d.items[t.dataset.fid];
    });
  } catch (e) {}
}

async function submit() {
  const data = collect();
  const status = heeftFeedback() ? "wijzigingen" : "akkoord";
  const payload = Object.assign({ status: status, stap: STAP }, data);
  const st = document.getElementById("status");
  st.textContent = "Versturen…"; st.className = "status";
  try {
    const r = await fetch("/feedback", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    if (!r.ok) throw new Error("HTTP " + r.status);
    st.textContent = "✓ Feedback verzonden — ga terug naar Claude en laat de skill verdergaan.";
    st.className = "status done";
    try { localStorage.removeItem(DRAFT_KEY); } catch (e) {}
  } catch (e) {
    st.textContent = "Fout bij versturen: " + e.message;
  }
}

document.getElementById("btn-verstuur").addEventListener("click", submit);
render();
</script>
</body>
</html>
