<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wetsanalyse — Review</title>
<style>
  :root {
    --bg: #f6f7f9; --panel: #fff; --ink: #1d2733; --muted: #5b6573;
    --line: #e2e6eb; --accent: #1f6feb; --accent-ink: #fff;
    --ok: #1a7f37; --warn: #9a6700; --chip: #eef2f7;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
         font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  header { position: sticky; top: 0; z-index: 5; background: var(--panel);
           border-bottom: 1px solid var(--line); padding: 14px 22px; }
  header h1 { margin: 0; font-size: 18px; }
  header .sub { color: var(--muted); font-size: 13px; margin-top: 3px; }
  main { max-width: 980px; margin: 0 auto; padding: 22px; }
  .panel { background: var(--panel); border: 1px solid var(--line);
           border-radius: 10px; padding: 16px 18px; margin-bottom: 18px; }
  .panel > h2 { margin: 0 0 10px; font-size: 15px; text-transform: uppercase;
                letter-spacing: .04em; color: var(--muted); }
  details summary { cursor: pointer; font-weight: 600; color: var(--muted); }
  .lid { margin: 8px 0; padding-left: 10px; border-left: 3px solid var(--line); }
  .lid b { color: var(--accent); }
  .item { border: 1px solid var(--line); border-radius: 9px; padding: 12px 14px;
          margin-bottom: 12px; background: #fff; }
  .item .top { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .item .id { font-weight: 700; color: var(--muted); font-size: 12px; }
  .chip { background: var(--chip); border-radius: 999px; padding: 2px 10px;
          font-size: 12px; font-weight: 600; }
  .formulering { font-style: italic; margin: 6px 0; }
  .meta { color: var(--muted); font-size: 13px; }
  .meta .lbl { font-weight: 600; color: var(--ink); }
  .grid { display: grid; grid-template-columns: max-content 1fr; gap: 2px 12px;
          font-size: 13px; margin: 6px 0; }
  .grid .lbl { color: var(--muted); font-weight: 600; }
  pre { background: #0f172a; color: #e2e8f0; border-radius: 7px; padding: 10px;
        overflow-x: auto; font-size: 12.5px; margin: 6px 0; white-space: pre-wrap; }
  textarea { width: 100%; min-height: 54px; resize: vertical; margin-top: 8px;
             border: 1px solid var(--line); border-radius: 7px; padding: 8px 10px;
             font: inherit; }
  textarea:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
  .subhead { font-size: 14px; font-weight: 700; margin: 4px 0 10px; }
  .actions { position: sticky; bottom: 0; background: var(--panel);
             border-top: 1px solid var(--line); padding: 14px 22px;
             display: flex; gap: 12px; align-items: center; }
  button { font: inherit; font-weight: 600; border-radius: 8px; padding: 9px 16px;
           cursor: pointer; border: 1px solid var(--line); background: #fff; }
  button.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  button.ok { background: var(--ok); color: #fff; border-color: var(--ok); }
  .status { color: var(--muted); font-size: 13px; }
  .status.done { color: var(--ok); font-weight: 600; }
  .panel.banner { background: #fff8e6; border-color: #f0d98c; color: var(--ink); }
  details.vorige { margin-top: 8px; padding-top: 6px; border-top: 1px dashed var(--line); }
  details.vorige summary { font-size: 12px; color: var(--muted); }
  details.vorige .meta { font-size: 13px; }
</style>
</head>
<body>
<header>
  <h1 id="title">Wetsanalyse — Review</h1>
  <div class="sub" id="subtitle"></div>
</header>
<main id="main"></main>
<div class="actions">
  <button class="ok" id="btn-akkoord">Akkoord — geen wijzigingen</button>
  <button class="primary" id="btn-verstuur">Verstuur feedback</button>
  <span class="status" id="status">Concept wordt lokaal bewaard tijdens het typen.</span>
</div>

<script>
/*__EMBEDDED_DATA__*/

const A = EMBEDDED_DATA.analyse || {};
const ACT = String(EMBEDDED_DATA.activiteit);
const RONDE = Number(EMBEDDED_DATA.ronde) || 1;
const VORIGE = EMBEDDED_DATA.vorige || null;
// Draft per ronde, zodat een concept uit een vorige ronde niet terugkomt.
const DRAFT_KEY = "wetsanalyse-review-act" + ACT + "-ronde" + RONDE;

// Index de vorige ronde op stabiele id, zodat we per item kunnen tonen wat de
// analist toen vroeg en hoe dat item er toen uitzag.
const VORIGE_FEEDBACK = (VORIGE && VORIGE.feedback && VORIGE.feedback.items) || {};
const VORIGE_ALGEMEEN = (VORIGE && VORIGE.feedback && VORIGE.feedback.algemeen) || "";
const VORIGE_ITEMS = buildVorigeItems(VORIGE && VORIGE.analyse);

function buildVorigeItems(analyse) {
  const map = {};
  if (!analyse) return map;
  for (const key of ["markeringen", "begrippen", "afleidingsregels"]) {
    for (const it of (analyse[key] || [])) {
      if (it && it.id != null) map[it.id] = it;
    }
  }
  return map;
}

function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function metaLine(label, value) {
  if (!value) return "";
  return `<div><span class="lbl">${esc(label)}:</span> ${esc(value)}</div>`;
}

function fb(id) {
  return `<textarea data-fid="${esc(id)}" placeholder="Feedback / correctie (laat leeg = akkoord)"></textarea>`;
}

// Ingeklapt context-blok bij een item in ronde 2+: wat de analist vorige ronde
// vroeg, en hoe het item er toen uitzag — zodat zichtbaar is of de feedback geland is.
function vorigeBlok(id, velden) {
  if (!VORIGE) return "";
  const fbVorig = VORIGE_FEEDBACK[id];
  const itVorig = VORIGE_ITEMS[id];
  if (!fbVorig && !itVorig) return "";
  let inner = "";
  if (fbVorig) {
    inner += `<div class="meta"><span class="lbl">Jouw vorige feedback:</span> ${esc(fbVorig)}</div>`;
  }
  if (itVorig) {
    const rows = velden
      .filter(([, k]) => itVorig[k])
      .map(([label, k]) => `<span class="lbl">${esc(label)}</span><span>${esc(itVorig[k])}</span>`)
      .join("");
    if (rows) inner += `<div class="grid" style="margin-top:6px">${rows}</div>`;
  }
  return `<details class="vorige"><summary>Vorige ronde</summary>
    <div style="margin-top:8px">${inner}</div></details>`;
}

function renderHeader() {
  const meta = [A.wet, A.artikel ? "artikel " + A.artikel : "", A.versiedatum]
    .filter(Boolean).join(" · ");
  document.getElementById("title").textContent =
    "Wetsanalyse — Review activiteit " + ACT +
    (ACT === "2" ? " (markeren & classificeren)" : " (begrippen & afleidingsregels)") +
    (RONDE > 1 ? " — ronde " + RONDE : "");
  document.getElementById("subtitle").textContent =
    meta + (A.bronreferentie ? "  —  " + A.bronreferentie : "");
}

function renderBanner() {
  if (RONDE <= 1) return "";
  return `<div class="panel banner"><b>Ronde ${RONDE}</b> — dit is een herziening na
    je feedback. Klap per item "Vorige ronde" open om te zien wat je vroeg en hoe het
    er toen uitzag, en bevestig of je correctie verwerkt is.</div>`;
}

function renderWettekst() {
  if (!A.leden || !A.leden.length) return "";
  const rows = A.leden.map(l =>
    `<div class="lid"><b>${l.lid ? "Lid " + esc(l.lid) : ""}</b> ${esc(l.tekst)}</div>`
  ).join("");
  return `<div class="panel"><details><summary>Wettekst (letterlijk) — context</summary>
    <div style="margin-top:10px">${rows}</div></details></div>`;
}

function renderMarkeringen() {
  const items = (A.markeringen || []).map(m => `
    <div class="item">
      <div class="top">
        <span class="id">#${esc(m.id)}</span>
        <span class="chip">${esc(m.klasse)}</span>
        <span class="meta">${esc(m.vindplaats || "")}</span>
      </div>
      <div class="formulering">"${esc(m.formulering)}"</div>
      ${m.toelichting ? `<div class="meta">${esc(m.toelichting)}</div>` : ""}
      ${fb(m.id)}
      ${vorigeBlok(m.id, [["Formulering", "formulering"], ["Klasse", "klasse"],
        ["Vindplaats", "vindplaats"], ["Toelichting", "toelichting"]])}
    </div>`).join("");
  return `<div class="panel"><h2>Markeringen &amp; classificaties (${(A.markeringen||[]).length})</h2>${items}</div>`;
}

function renderSamenhang() {
  if (!A.samenhang) return "";
  return `<div class="panel"><h2>Samenhang centrale klassen</h2>
    <div style="white-space:pre-wrap">${esc(A.samenhang)}</div>${fb("samenhang")}</div>`;
}

function renderBegrippen() {
  const items = (A.begrippen || []).map(b => `
    <div class="item">
      <div class="top"><span class="id">#${esc(b.id)}</span>
        <span class="chip">${esc(b.klasse)}</span>
        <strong>${esc(b.naam)}</strong></div>
      <div class="grid">
        ${b.definitie ? `<span class="lbl">Definitie</span><span>${esc(b.definitie)}</span>` : ""}
        ${b.voorbeeld ? `<span class="lbl">Voorbeeld</span><span>${esc(b.voorbeeld)}</span>` : ""}
        ${b.kenmerken ? `<span class="lbl">Kenmerken/relaties</span><span>${esc(b.kenmerken)}</span>` : ""}
        ${b.vindplaats ? `<span class="lbl">Vindplaats</span><span>${esc(b.vindplaats)}</span>` : ""}
        ${b.twijfel ? `<span class="lbl">Twijfel/aanname</span><span>${esc(b.twijfel)}</span>` : ""}
      </div>
      ${fb(b.id)}
      ${vorigeBlok(b.id, [["Naam", "naam"], ["Klasse", "klasse"],
        ["Definitie", "definitie"], ["Kenmerken/relaties", "kenmerken"],
        ["Vindplaats", "vindplaats"], ["Twijfel/aanname", "twijfel"]])}
    </div>`).join("");
  return `<div class="panel"><h2>Begrippen (${(A.begrippen||[]).length})</h2>${items}</div>`;
}

function renderRegels() {
  const items = (A.afleidingsregels || []).map(r => `
    <div class="item">
      <div class="top"><span class="id">#${esc(r.id)}</span>
        <span class="chip">${esc(r.type || "afleidingsregel")}</span>
        <strong>${esc(r.naam)}</strong></div>
      <div class="grid">
        ${r.uitvoervariabele ? `<span class="lbl">Uitvoer</span><span>${esc(r.uitvoervariabele)}</span>` : ""}
        ${r.invoervariabelen ? `<span class="lbl">Invoer</span><span>${esc(r.invoervariabelen)}</span>` : ""}
        ${r.parameters ? `<span class="lbl">Parameters</span><span>${esc(r.parameters)}</span>` : ""}
        ${r.voorwaarden ? `<span class="lbl">Voorwaarden</span><span>${esc(r.voorwaarden)}</span>` : ""}
        ${r.vindplaats ? `<span class="lbl">Vindplaats</span><span>${esc(r.vindplaats)}</span>` : ""}
        ${r.twijfel ? `<span class="lbl">Twijfel/aanname</span><span>${esc(r.twijfel)}</span>` : ""}
      </div>
      ${r.formulering ? `<pre>${esc(r.formulering)}</pre>` : ""}
      ${fb(r.id)}
      ${vorigeBlok(r.id, [["Naam", "naam"], ["Type", "type"],
        ["Uitvoer", "uitvoervariabele"], ["Invoer", "invoervariabelen"],
        ["Parameters", "parameters"], ["Voorwaarden", "voorwaarden"],
        ["Formulering", "formulering"], ["Vindplaats", "vindplaats"],
        ["Twijfel/aanname", "twijfel"]])}
    </div>`).join("");
  return `<div class="panel"><h2>Afleidingsregels (${(A.afleidingsregels||[]).length})</h2>${items}</div>`;
}

function renderValidatie() {
  if (!A.validatiepunten) return "";
  return `<div class="panel"><h2>Aandachtspunten voor validatie</h2>
    <div style="white-space:pre-wrap">${esc(A.validatiepunten)}</div>${fb("validatiepunten")}</div>`;
}

function renderAlgemeen() {
  const vorig = VORIGE_ALGEMEEN
    ? `<div class="meta" style="margin-bottom:8px"><span class="lbl">Jouw vorige
        algemene feedback:</span> ${esc(VORIGE_ALGEMEEN)}</div>`
    : "";
  return `<div class="panel"><h2>Algemene feedback (hele activiteit ${ACT})</h2>${vorig}
    <textarea data-fid="__algemeen__" style="min-height:90px"
      placeholder="Algemene opmerkingen, ontbrekende markeringen/begrippen, methodische punten…"></textarea></div>`;
}

function render() {
  renderHeader();
  let html = renderBanner() + renderWettekst();
  if (ACT === "2") {
    html += renderMarkeringen() + renderSamenhang();
  } else {
    html += renderBegrippen() + renderRegels() + renderValidatie();
  }
  html += renderAlgemeen();
  document.getElementById("main").innerHTML = html;
  restoreDraft();
  document.querySelectorAll("textarea").forEach(t =>
    t.addEventListener("input", saveDraft));
}

function collect() {
  const items = {};
  let algemeen = "";
  document.querySelectorAll("textarea").forEach(t => {
    const v = t.value.trim();
    if (!v) return;
    if (t.dataset.fid === "__algemeen__") algemeen = v;
    else items[t.dataset.fid] = v;
  });
  return { items, algemeen };
}

function saveDraft() {
  try { localStorage.setItem(DRAFT_KEY, JSON.stringify(collect())); } catch (e) {}
}

function restoreDraft() {
  try {
    const d = JSON.parse(localStorage.getItem(DRAFT_KEY) || "{}");
    document.querySelectorAll("textarea").forEach(t => {
      if (t.dataset.fid === "__algemeen__" && d.algemeen) t.value = d.algemeen;
      else if (d.items && d.items[t.dataset.fid]) t.value = d.items[t.dataset.fid];
    });
  } catch (e) {}
}

async function submit(status) {
  const payload = Object.assign({ status: status, activiteit: ACT }, collect());
  const st = document.getElementById("status");
  st.textContent = "Versturen…"; st.className = "status";
  try {
    const r = await fetch("/feedback", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    if (!r.ok) throw new Error("HTTP " + r.status);
    st.textContent = "✓ Feedback verzonden — ga terug naar Claude en laat de analyse verdergaan.";
    st.className = "status done";
    try { localStorage.removeItem(DRAFT_KEY); } catch (e) {}
  } catch (e) {
    st.textContent = "Fout bij versturen: " + e.message;
  }
}

document.getElementById("btn-akkoord").addEventListener("click", () => submit("akkoord"));
document.getElementById("btn-verstuur").addEventListener("click", () => submit("wijzigingen"));
render();
</script>
</body>
</html>
