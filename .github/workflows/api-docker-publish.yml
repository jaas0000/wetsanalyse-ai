# Bouwt de Wetsanalyse API-image en pusht naar GitHub Container Registry (GHCR).
# Draait bij wijzigingen in de API-map (of de gebakken skill-references/scripts) op master en
# bij versietags (v*). Portainer pullt vervolgens ghcr.io/<owner>/wetsanalyse-api:latest.
# Spiegelt .github/workflows/docker-publish.yml (de MCP) qua opzet en securitypoort.

name: api-docker-publish

on:
  push:
    branches: [master]
    tags: ["v*"]
    paths:
      - "api/**"
      # API-documentatie (*.md) triggert géén build/deploy.
      - "!api/**/*.md"
      # De skill-references/scripts/assets worden in de image gebakken → wél rebuilden (incl. .md).
      # assets/ levert de viewer-HTML (rapport.html/review.html) die de server serveert.
      - ".claude/skills/wetsanalyse/references/**"
      - ".claude/skills/wetsanalyse/scripts/**"
      - ".claude/skills/wetsanalyse/assets/**"
      - ".github/workflows/api-docker-publish.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/wetsanalyse-api
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Kwaliteits- en kwetsbaarhedenpoort (BIO2 / ISO 27002:2022 §8.8) ──────────
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run pytest -q
      - name: pip-audit (faalt bij bekende kwetsbaarheden)
        run: uv run --with pip-audit pip-audit

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    env:
      # CI → Portainer stack-redeploy. Inactief tot de secrets/vars bestaan.
      PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
      PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
      PORTAINER_STACK_ID: ${{ vars.PORTAINER_API_STACK_ID }}
      PORTAINER_ENDPOINT_ID: "1"
      PROXY_NETWORK: "homeinfra_internal"
      # Niet-geheime stack-variabelen (secrets leven on-host als bestanden; zie api/CLAUDE.md).
      LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
      LLM_MODEL: ${{ vars.LLM_MODEL }}
      LLM_API_BASE: ${{ vars.LLM_API_BASE }}
      LLM_API_VERSION: ${{ vars.LLM_API_VERSION }}
      SECRETS_DIR: ${{ vars.SECRETS_DIR }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in bij GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Buildtijd bepalen
        id: buildtime
        run: echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build en push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          # Context = projectroot: de image bakt de skill-references/scripts mee.
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.buildtime.outputs.ts }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      # ── Image-scan (BIO2 / ISO 27002:2022 §8.8) ───────────────────────────────
      - name: Trivy image-scan (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy-resultaten naar Security-tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: trivy-results.sarif

      - name: Trivy gate (faalt bij CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: table
          ignore-unfixed: true
          severity: CRITICAL
          exit-code: "1"

  deploy-azure:
    needs: build-and-push
    runs-on: ubuntu-latest

    if: ${{ github.ref == 'refs/heads/master'
        && secrets.AZURE_CLIENT_ID != ''
        && secrets.AZURE_CLIENT_SECRET != ''
        && secrets.AZURE_TENANT_ID != ''
        && secrets.AZURE_SUBSCRIPTION_ID != ''
        && secrets.AZURE_AI_KEY != ''
        && vars.LLM_API_BASE != '' }}

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Azure
        run: |
          python3 deploy/azure/gen-deploy.py \
            "${{ secrets.AZURE_AI_KEY }}" \
            --llm-api-base "${{ vars.LLM_API_BASE }}" \
            --resource-group rg-wetsanalyse \
            --run

  deploy-portainer:
    needs: build-and-push
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
      PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
      PORTAINER_STACK_ID: ${{ vars.PORTAINER_API_STACK_ID }}
      PORTAINER_ENDPOINT_ID: "1"
      PROXY_NETWORK: "homeinfra_internal"

      LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
      LLM_MODEL: ${{ vars.LLM_MODEL }}
      LLM_API_BASE: ${{ vars.LLM_API_BASE }}
      LLM_API_VERSION: ${{ vars.LLM_API_VERSION }}
      SECRETS_DIR: ${{ vars.SECRETS_DIR }}

    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4
      - name: Portainer redeploy via stack-update (pull :latest)
        if: ${{ github.ref == 'refs/heads/master' && env.PORTAINER_API_KEY != '' && env.PORTAINER_STACK_ID != '' }}
        env:
          HEALTH_URL: https://wetsanalyse-api.ipalm.nl/health
        run: |
          set -euo pipefail
          # Secrets (LLM_API_KEY, tokens) leven on-host als bestanden; CI stuurt ze niet mee.
          if [ -z "${LLM_MODEL:-}" ]; then
            echo "::error::LLM_MODEL is leeg — zet de repo-variabele vars.LLM_MODEL. Redeploy overgeslagen."
            exit 1
          fi
          payload=$(jq -n \
            --rawfile compose api/docker-compose.yml \
            --arg net "$PROXY_NETWORK" \
            --arg prov "${LLM_PROVIDER:-azure_ai}" \
            --arg model "$LLM_MODEL" \
            --arg base "${LLM_API_BASE:-}" \
            --arg ver "${LLM_API_VERSION:-}" \
            --arg secrets_dir "${SECRETS_DIR:-/volume1/docker/secrets/wetsanalyse-api}" \
            '{stackFileContent:$compose,
              env:[{name:"PROXY_NETWORK",value:$net},
                   {name:"LLM_PROVIDER",value:$prov},
                   {name:"LLM_MODEL",value:$model},
                   {name:"LLM_API_BASE",value:$base},
                   {name:"LLM_API_VERSION",value:$ver},
                   {name:"SECRETS_DIR",value:$secrets_dir}],
              pullImage:true, prune:false}')
          # Idempotente redeploy. Portainers in-place recreate (pullImage:true) kan transient
          # struikelen op een daemon-race — "removal of container … is already in progress" —
          # en geeft dan HTTP 500, wat de stack half-applied achterlaat (postgres blijft `Created`).
          # Een 5xx is per definitie tijdelijk: de removal voltooit en een herhaalde PUT laat
          # Compose schoon convergeren. Daarom tot 3 pogingen met oplopende backoff. Alleen 4xx
          # (config/auth) is hard fout; 2xx breekt direct af; een curl-timeout draait mogelijk
          # async door (niet opnieuw PUT'en) en laat de health-check beslissen.
          deploy_put() {
            curl -sS -X PUT --max-time 300 \
              "$PORTAINER_URL/api/stacks/$PORTAINER_STACK_ID?endpointId=$PORTAINER_ENDPOINT_ID" \
              -H "X-API-Key: $PORTAINER_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$payload" -o /tmp/portainer-resp.json -w "%{http_code}"
          }
          for attempt in 1 2 3; do
            rc=0
            code=$(deploy_put) || rc=$?
            echo "redeploy poging $attempt: curl_rc=$rc http=$code"
            if [ "$rc" -ne 0 ]; then
              echo "::warning::curl-fout (rc=$rc, bv. timeout) — update draait mogelijk async door; health-check is bepalend."
              break
            fi
            case "$code" in
              2*) echo "Stack-update geaccepteerd."; break ;;
              4*) echo "::error::Stack-update geweigerd (HTTP $code — config/auth)"; cat /tmp/portainer-resp.json || true; exit 1 ;;
              *)  if [ "$attempt" -lt 3 ]; then
                    backoff=$((attempt * 45))
                    echo "::warning::HTTP $code — vermoedelijk transiënte recreate-race; backoff ${backoff}s en opnieuw…"
                    sleep "$backoff"
                  else
                    echo "::warning::HTTP $code na 3 pogingen — update draait mogelijk async door; health-check is bepalend."
                  fi ;;
            esac
          done
          echo "Health-verificatie op $HEALTH_URL ..."
          for i in $(seq 1 20); do
            if curl -fsS --max-time 10 "$HEALTH_URL" -o /dev/null; then
              echo "Service gezond na redeploy (poging $i)."
              exit 0
            fi
            sleep 15
          done
          echo "::error::Service niet gezond na redeploy. Controleer de containerlogs in Portainer."
          exit 1


