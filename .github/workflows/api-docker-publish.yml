# Bouwt de Wetsanalyse API-image en pusht naar GitHub Container Registry (GHCR).
# Draait bij wijzigingen in de API-map (of de gebakken skill-references/scripts) op master en
# bij versietags (v*). Portainer pullt vervolgens ghcr.io/<owner>/wetsanalyse-api:latest.
# Spiegelt .github/workflows/docker-publish.yml (de MCP) qua opzet en securitypoort.

name: api-docker-publish

on:
  push:
    branches: [master]
    tags: ["v*"]
    paths:
      - "api/**"
      # API-documentatie (*.md) triggert géén build/deploy.
      - "!api/**/*.md"
      # De skill-references/scripts/assets worden in de image gebakken → wél rebuilden (incl. .md).
      # assets/ levert de viewer-HTML (rapport.html/review.html) die de server serveert.
      - ".claude/skills/wetsanalyse/references/**"
      - ".claude/skills/wetsanalyse/scripts/**"
      - ".claude/skills/wetsanalyse/assets/**"
      - ".github/workflows/api-docker-publish.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/wetsanalyse-api
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Kwaliteits- en kwetsbaarhedenpoort (BIO2 / ISO 27002:2022 §8.8) ──────────
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run pytest -q
      - name: pip-audit (faalt bij bekende kwetsbaarheden)
        run: uv run --with pip-audit pip-audit

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    env:
      # CI → Portainer stack-redeploy. Inactief tot de secrets/vars bestaan.
      PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
      PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
      PORTAINER_STACK_ID: ${{ vars.PORTAINER_API_STACK_ID }}
      PORTAINER_ENDPOINT_ID: "1"
      PROXY_NETWORK: "homeinfra_internal"
      # Niet-geheime stack-variabelen (secrets leven on-host als bestanden; zie api/CLAUDE.md).
      LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
      LLM_MODEL: ${{ vars.LLM_MODEL }}
      LLM_API_BASE: ${{ vars.LLM_API_BASE }}
      LLM_API_VERSION: ${{ vars.LLM_API_VERSION }}
      SECRETS_DIR: ${{ vars.SECRETS_DIR }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in bij GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Buildtijd bepalen
        id: buildtime
        run: echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build en push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          # Context = projectroot: de image bakt de skill-references/scripts mee.
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.buildtime.outputs.ts }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      # ── Image-scan (BIO2 / ISO 27002:2022 §8.8) ───────────────────────────────
      - name: Trivy image-scan (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy-resultaten naar Security-tab
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: trivy-results.sarif

      - name: Trivy gate (faalt bij CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: table
          ignore-unfixed: true
          severity: CRITICAL
          exit-code: "1"

      - name: Portainer redeploy (op digest, met convergentie-verificatie)
        if: ${{ github.ref == 'refs/heads/master' && env.PORTAINER_API_KEY != '' && env.PORTAINER_STACK_ID != '' }}
        env:
          HEALTH_URL: https://wetsanalyse-api.ipalm.nl/health
          # Deploy exact de zojuist gebouwde/gescande/geattesteerde image (digest), niet "wat :latest
          # toevallig is" — deterministisch, en het deploy-script kan zo verifiëren dat de NIEUWE
          # image daadwerkelijk draait i.p.v. een oude container die de health-check false-passt.
          IMAGE_DIGEST_REF: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          # Secrets (LLM_API_KEY, tokens) leven on-host als bestanden; CI stuurt ze niet mee.
          if [ -z "${LLM_MODEL:-}" ]; then
            echo "::error::LLM_MODEL is leeg — zet de repo-variabele vars.LLM_MODEL. Redeploy overgeslagen."
            exit 1
          fi
          jq -n \
            --rawfile compose api/docker-compose.yml \
            --arg net "$PROXY_NETWORK" \
            --arg img "$IMAGE_DIGEST_REF" \
            --arg prov "${LLM_PROVIDER:-azure_ai}" \
            --arg model "$LLM_MODEL" \
            --arg base "${LLM_API_BASE:-}" \
            --arg ver "${LLM_API_VERSION:-}" \
            --arg secrets_dir "${SECRETS_DIR:-/volume1/docker/secrets/wetsanalyse-api}" \
            '{stackFileContent:$compose,
              env:[{name:"PROXY_NETWORK",value:$net},
                   {name:"WETSANALYSE_API_IMAGE",value:$img},
                   {name:"LLM_PROVIDER",value:$prov},
                   {name:"LLM_MODEL",value:$model},
                   {name:"LLM_API_BASE",value:$base},
                   {name:"LLM_API_VERSION",value:$ver},
                   {name:"SECRETS_DIR",value:$secrets_dir}],
              pullImage:true, prune:false}' > /tmp/payload.json
          # PUT (idempotente retry) + convergentie: orphan-'Created'-containers opruimen en bevestigen
          # dat er precies één verse, gezonde container op de nieuwe digest draait. Zie het script.
          bash .github/scripts/portainer-deploy.sh /tmp/payload.json wetsanalyse-api "$IMAGE_DIGEST_REF" "$HEALTH_URL"
