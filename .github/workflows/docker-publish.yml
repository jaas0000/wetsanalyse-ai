# Bouwt de Wettenbank MCP-image en pusht naar GitHub Container Registry (GHCR).
# Draait bij wijzigingen in de MCP-map op main en bij versietags (v*).
# Portainer pullt vervolgens ghcr.io/<owner>/wettenbank-mcp:latest.

name: docker-publish

on:
  push:
    branches: [master]
    tags: ["v*"]
    paths:
      - "tools/wettenbank-mcp/**"
      # Pure documentatiewijzigingen (*.md) triggeren géén build/deploy. De negatie
      # na de include sluit markdown uit; een commit met alléén .md-wijzigingen draait
      # de workflow dus niet. Handmatig draaien kan altijd via workflow_dispatch.
      - "!tools/wettenbank-mcp/**/*.md"
      - "!tools/wettenbank-mcp/*.md"
      - ".github/workflows/docker-publish.yml"
  # Wekelijkse rebuild: verse base-image-layers en apt-security-patches, ook zonder
  # codewijziging (de Dockerfile draait `apt-get upgrade` — versheid hangt aan de
  # rebuild-cadans). Maandagochtend, vóór werktijd.
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/wettenbank-mcp
  # Forceer Node 24 voor JS-actions, inclusief transitief gepinde (bv. actions/cache
  # binnen setup-node). Ruimt de Node 20-deprecatiewaarschuwing op; wordt een no-op
  # zodra Node 24 de default is (vanaf 16 juni 2026).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Kwaliteits- en kwetsbaarhedenpoort (BIO2 / ISO 27002:2022 §8.8) ──────────
  # Unit-tests + npm audit. Faalt de build bij hoge/kritieke kwetsbaarheden in
  # dependencies, zodat een lek niet ongemerkt naar productie wordt gepusht.
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: tools/wettenbank-mcp
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: tools/wettenbank-mcp/package-lock.json
      - run: npm ci
      - run: npm test
      - name: dist/ actueel? (gecommitte build mag niet driften van src/)
        run: |
          npm run build
          git diff --exit-code -- dist || {
            echo "::error::dist/ wijkt af van src/ — draai 'npm run build' en commit dist/ mee."
            exit 1
          }
      - name: npm audit (faalt bij moderate of hoger)
        run: npm audit --omit=dev --audit-level=moderate

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    env:
      # CI → Portainer stack-redeploy. Inactief tot PORTAINER_API_KEY als secret bestaat.
      PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
      PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
      # Per-client tokens als id:token-lijst. Valt terug op de legacy single-secret
      # zodat een bestaande deploy niet breekt (zet bij voorkeur secret MCP_AUTH_TOKENS).
      MCP_AUTH_TOKENS: ${{ secrets.MCP_AUTH_TOKENS || secrets.MCP_AUTH_TOKEN }}
      PORTAINER_STACK_ID: "219"
      PORTAINER_ENDPOINT_ID: "1"
      PROXY_NETWORK: "homeinfra_internal"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # docker-container-driver is nodig voor de gha-buildcache hieronder.
      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in bij GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Buildtijd bepalen
        id: buildtime
        run: echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build en push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: tools/wettenbank-mcp
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Build-herkomst → runtime via ENV, zichtbaar op /health voor deploy-pariteit.
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.buildtime.outputs.ts }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # SBOM + provenance als attestatie bij de image (ISO 27002:2022 §8.8).
          sbom: true
          provenance: mode=max

      # ── Image-scan (BIO2 / ISO 27002:2022 §8.8) ───────────────────────────────
      # Scant de gepushte image op OS-/library-kwetsbaarheden. Rapporteert naar het
      # GitHub Security-tabblad (SARIF) en faalt bij CRITICAL.
      - name: Trivy image-scan (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy-resultaten naar Security-tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: trivy-results.sarif

      - name: Trivy gate (faalt bij CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: table
          ignore-unfixed: true
          severity: CRITICAL
          exit-code: "1"

      - name: Portainer redeploy via stack-update (op digest)
        if: ${{ github.ref == 'refs/heads/master' && env.PORTAINER_API_KEY != '' }}
        env:
          HEALTH_URL: https://wettenbank-mcp.ipalm.nl/health
          # Deploy exact de zojuist gebouwde, gescande en geattesteerde image — niet
          # "wat :latest op dat moment toevallig is". Een gecompromitteerd registry-token
          # kan zo niet ongemerkt een andere image laten draaien.
          IMAGE_DIGEST_REF: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          # Fail-fast: deploy geen stack zonder token. Een lege MCP_AUTH_TOKENS zou de
          # draaiende container fail-closed laten crashen (zie auth.ts / index.ts).
          if [ -z "${MCP_AUTH_TOKENS:-}" ]; then
            echo "::error::MCP_AUTH_TOKENS is leeg — zet de GitHub-secret (id:token,... of een kale token). Redeploy overgeslagen."
            exit 1
          fi
          payload=$(jq -n \
            --rawfile compose tools/wettenbank-mcp/docker-compose.yml \
            --arg tok "$MCP_AUTH_TOKENS" \
            --arg net "$PROXY_NETWORK" \
            --arg img "$IMAGE_DIGEST_REF" \
            '{stackFileContent:$compose,
              env:[{name:"MCP_AUTH_TOKENS",value:$tok},{name:"PROXY_NETWORK",value:$net},
                   {name:"WETTENBANK_IMAGE",value:$img}],
              pullImage:true, prune:false}')
          # De synchrone stack-update kan langer duren dan de client-timeout; een curl-fout
          # (timeout) of 5xx betekent NIET dat de deploy mislukte — Portainer draait async door.
          # Daarom faalt alleen 4xx (config/auth) hier hard; de rest gaat door naar de health-check
          # hieronder, die bepalend is. (Voorheen verdubbelde `|| echo "000"` de status tot
          # "000000", waardoor een geslaagde-maar-trage deploy ten onrechte rood werd gevlagd.)
          rc=0
          code=$(curl -sS -X PUT --max-time 300 \
            "$PORTAINER_URL/api/stacks/$PORTAINER_STACK_ID?endpointId=$PORTAINER_ENDPOINT_ID" \
            -H "X-API-Key: $PORTAINER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload" -o /tmp/portainer-resp.json -w "%{http_code}") || rc=$?
          echo "redeploy: curl_rc=$rc http=$code"
          if [ "$rc" -ne 0 ]; then
            echo "::warning::curl-fout (rc=$rc, bv. timeout) — update draait mogelijk async door; health-check is bepalend."
          else
            case "$code" in
              2*) echo "Stack-update geaccepteerd." ;;
              4*) echo "::error::Stack-update geweigerd (HTTP $code — config/auth)"; cat /tmp/portainer-resp.json || true; exit 1 ;;
              *)  echo "::warning::HTTP $code — update draait mogelijk async door; health-check is bepalend." ;;
            esac
          fi
          # Bevestig dat de nieuwe container daadwerkelijk gezond opstart (max ~5 min).
          echo "Health-verificatie op $HEALTH_URL ..."
          for i in $(seq 1 20); do
            if curl -fsS --max-time 10 "$HEALTH_URL" -o /dev/null; then
              echo "Service gezond na redeploy (poging $i)."
              exit 0
            fi
            sleep 15
          done
          echo "::error::Service niet gezond na redeploy. Controleer de containerlogs in Portainer."
          exit 1
